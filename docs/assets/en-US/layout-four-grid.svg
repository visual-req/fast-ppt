<text x="220" y="274" fill="#1d4ed8" font-size="28" font-family="Arial, sans-serif" font-weight="700">Input</text>
<text x="920" y="274" fill="#4338ca" font-size="28" font-family="Arial, sans-serif" font-weight="700">Output</text>
