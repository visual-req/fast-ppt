<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1e3a5f" flood-opacity="0.10"/>
    </filter>
  </defs>
<defs>
<linearGradient id="sectionBg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1d4ed8"/>
</linearGradient>
</defs>
<rect width="1600" height="900" fill="url(#pageBg)"/>
<rect x="60" y="50" width="1480" height="800" rx="32" fill="url(#sectionBg)"/>
<text x="140" y="210" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif" font-weight="700">Chapter 02</text>
<text x="140" y="308" fill="#ffffff" font-size="58" font-family="Arial, sans-serif" font-weight="700">Section Divider</text>
