<text x="640" y="210" fill="#143d7a" font-size="25" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">チーム強化</text>
<text x="640" y="244" fill="#475569" font-size="18" font-family="Arial, sans-serif" font-weight="400" text-anchor="middle">方法・テンプレート・運営を強化</text>
<circle cx="930" cy="310" r="34" fill="#ffffff" stroke="url(#blueGrad)" stroke-width="8"/>
