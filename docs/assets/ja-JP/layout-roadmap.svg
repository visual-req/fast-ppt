<text x="980" y="210" fill="#143d7a" font-size="25" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">顧客運営</text>
<text x="980" y="244" fill="#475569" font-size="18" font-family="Arial, sans-serif" font-weight="400" text-anchor="middle">高価値顧客の転換率を高める</text>
<circle cx="310" cy="500" r="34" fill="#ffffff" stroke="url(#blueGrad)" stroke-width="8"/>
