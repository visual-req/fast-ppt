<circle cx="1110" cy="500" r="34" fill="#ffffff" stroke="url(#blueGrad)" stroke-width="8"/>
<text x="1110" y="510" fill="#143d7a" font-size="28" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">06</text>
