<text x="310" y="244" fill="#475569" font-size="18" font-family="Arial, sans-serif" font-weight="400" text-anchor="middle">重点顧客と重点地域を深く攻める</text>
<circle cx="590" cy="310" r="34" fill="#ffffff" stroke="url(#blueGrad)" stroke-width="8"/>
