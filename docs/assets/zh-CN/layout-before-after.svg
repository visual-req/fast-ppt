<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f4f7fb"/>
    <stop offset="100%" stop-color="#eef3f9"/>
  </linearGradient>
  <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1f4f97"/>
    <stop offset="100%" stop-color="#123b7a"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4da0ff"/>
    <stop offset="100%" stop-color="#1d6fe8"/>
  </linearGradient>
  <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1e3a5f" flood-opacity="0.10"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="url(#pageBg)"/>
<rect x="54" y="44" width="1492" height="812" rx="36" fill="#ffffff" stroke="#d7e3f4" stroke-width="1.5" filter="url(#panelShadow)"/>
