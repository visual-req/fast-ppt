<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1e3a5f" flood-opacity="0.10"/>
    </filter>
  </defs>
<rect width="1600" height="900" fill="url(#pageBg)"/>
<rect x="54" y="44" width="1492" height="812" rx="36" fill="#ffffff" stroke="#d7e3f4" stroke-width="1.5" filter="url(#panelShadow)"/>
<text x="110" y="126" fill="#143d7a" font-size="46" font-family="Arial, sans-serif" font-weight="700">Summary</text>

<rect x="120" y="192" width="1360" height="540" rx="28" fill="#eff6ff"/>
<circle cx="174" cy="286" r="10" fill="#2563eb"/><circle cx="174" cy="386" r="10" fill="#2563eb"/><circle cx="174" cy="486" r="10" fill="#2563eb"/><circle cx="174" cy="586" r="10" fill="#2563eb"/>
<text x="208" y="294" fill="#0f172a" font-size="30" font-family="Arial, sans-serif">先确认页面意图，再选 layout</text>
<text x="208" y="394" fill="#0f172a" font-size="30" font-family="Arial, sans-serif">概念页尽量用图，不继续堆文字</text>
<text x="208" y="494" fill="#0f172a" font-size="30" font-family="Arial, sans-serif">结构图优先 SVG，数据图优先 ECharts</text>
