<text x="32" y="112" fill="#0f172a" font-size="30" font-family="Arial, sans-serif" font-weight="700">前端预览</text>
<text x="32" y="162" fill="#334155" font-size="21" font-family="Arial, sans-serif">viewer 打开</text>
<text x="32" y="198" fill="#334155" font-size="21" font-family="Arial, sans-serif">返回 /api/deck</text>
<text x="32" y="234" fill="#334155" font-size="21" font-family="Arial, sans-serif">浏览器核对</text>
