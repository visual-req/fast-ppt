<text x="32" y="112" fill="#0f172a" font-size="30" font-family="Arial, sans-serif" font-weight="700">项目材料</text>
<text x="32" y="162" fill="#334155" font-size="21" font-family="Arial, sans-serif">需求说明</text>
<text x="32" y="198" fill="#334155" font-size="21" font-family="Arial, sans-serif">类型判断</text>
<text x="32" y="234" fill="#334155" font-size="21" font-family="Arial, sans-serif">目标与约束</text>
</g>

<g transform="translate(446 220)">
