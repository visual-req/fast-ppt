<text x="32" y="112" fill="#0f172a" font-size="30" font-family="Arial, sans-serif" font-weight="700">outline</text>
<text x="32" y="162" fill="#334155" font-size="21" font-family="Arial, sans-serif">规划章节</text>
<text x="32" y="198" fill="#334155" font-size="21" font-family="Arial, sans-serif">规划页意图</text>
<text x="32" y="234" fill="#334155" font-size="21" font-family="Arial, sans-serif">选择 layout</text>
<rect x="32" y="318" width="220" height="78" rx="16" fill="#ffffff" stroke="#c7d2fe"/>
<text x="52" y="360" fill="#4338ca" font-size="18" font-family="Arial, sans-serif" font-weight="700">门禁</text>
<text x="52" y="388" fill="#334155" font-size="18" font-family="Arial, sans-serif">未通过先回改大纲</text>
</g>

<g transform="translate(826 220)">
<rect width="300" height="440" rx="28" fill="#ecfeff" stroke="#a5f3fc"/>
<rect x="24" y="24" width="90" height="34" rx="17" fill="#0891b2"/>
