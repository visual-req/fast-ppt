<text x="32" y="112" fill="#0f172a" font-size="30" font-family="Arial, sans-serif" font-weight="700">detail</text>
<text x="32" y="162" fill="#334155" font-size="21" font-family="Arial, sans-serif">生成 deck</text>
<text x="32" y="198" fill="#334155" font-size="21" font-family="Arial, sans-serif">生成 slides</text>
<text x="32" y="234" fill="#334155" font-size="21" font-family="Arial, sans-serif">补 SVG 素材</text>
<rect x="32" y="318" width="220" height="78" rx="16" fill="#ffffff" stroke="#a5f3fc"/>
<text x="52" y="360" fill="#0891b2" font-size="18" font-family="Arial, sans-serif" font-weight="700">门禁</text>
<text x="52" y="388" fill="#334155" font-size="18" font-family="Arial, sans-serif">未通过先回改详细页</text>
</g>

<g transform="translate(1206 250)">
