<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="1400" height="780" fill="url(#bg)" rx="28" />
  <text x="80" y="90" font-size="38" font-weight="700" fill="#0f172a">从提示词工程到闭环工程</text>
  <text x="80" y="128" font-size="20" fill="#475569">从“问得更准”升级为“可执行、可验证、可回归”的闭环工程</text>

  <g transform="translate(80 190)">
    <rect width="340" height="420" rx="24" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="24" y="24" width="128" height="34" rx="17" fill="#dbeafe" />
    <text x="88" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">第一代</text>
    <text x="24" y="100" font-size="32" font-weight="700" fill="#0f172a">提示词工程</text>
    <text x="24" y="142" font-size="20" fill="#334155">核心：把问题问准</text>
    <text x="24" y="202" font-size="18" fill="#334155">- 角色 / 语气 / 格式 / 约束</text>
    <text x="24" y="238" font-size="18" fill="#334155">- 适合：简单问答、单步生成</text>
    <text x="24" y="274" font-size="18" fill="#334155">- 风险：歧义高、稳定性弱</text>
    <text x="24" y="310" font-size="18" fill="#334155">- 过程控制弱</text>
  </g>

  <g transform="translate(530 160)">
    <rect width="340" height="470" rx="24" fill="#ffffff" stroke="#93c5fd" stroke-width="2" />
    <rect x="24" y="24" width="128" height="34" rx="17" fill="#dbeafe" />
    <text x="88" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">第二代</text>
    <text x="24" y="100" font-size="32" font-weight="700" fill="#0f172a">上下文工程</text>
    <text x="24" y="142" font-size="20" fill="#334155">核心：把材料组织对</text>
    <text x="24" y="202" font-size="18" fill="#334155">- 文档 / 规则 / 示例 / 记忆</text>
    <text x="24" y="238" font-size="18" fill="#334155">- 强化任务边界与背景信息</text>
    <text x="24" y="274" font-size="18" fill="#334155">- 适合：多材料理解与复杂生成</text>
    <text x="24" y="310" font-size="18" fill="#334155">- 风险：信息过载 / 上下文污染</text>
    <text x="24" y="346" font-size="18" fill="#334155">- 仍缺少稳定的执行闭环</text>
  </g>

  <g transform="translate(980 130)">
    <rect width="340" height="530" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="3" />
    <rect x="24" y="24" width="128" height="34" rx="17" fill="#2563eb" />
    <text x="88" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">第三代</text>
    <text x="24" y="100" font-size="32" font-weight="700" fill="#0f172a">闭环工程</text>
    <text x="24" y="142" font-size="20" fill="#334155">核心：稳定执行与验证</text>
    <text x="24" y="202" font-size="18" fill="#334155">- 串起 上下文 / 工具 / 规划</text>
    <text x="24" y="238" font-size="18" fill="#334155">- 管理环境与产物（目录、端口、依赖）</text>
    <text x="24" y="274" font-size="18" fill="#334155">- 引入 评估器 做质量门禁</text>
    <text x="24" y="310" font-size="18" fill="#334155">- 适合：复杂多步骤、可回归任务</text>
    <text x="24" y="346" font-size="18" fill="#334155">- 支持持续迭代与规模化复用</text>
    <text x="24" y="382" font-size="18" fill="#334155">- 从“写得对”转向“跑得稳”</text>
  </g>

  <line x1="430" y1="390" x2="510" y2="390" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)" />
  <line x1="880" y1="390" x2="960" y2="390" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)" />
  <text x="452" y="356" font-size="18" font-weight="700" fill="#1d4ed8">从“问法”走向“材料”</text>
  <text x="905" y="356" font-size="18" font-weight="700" fill="#1d4ed8">从“材料”走向“闭环系统”</text>
</svg>
