<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.14)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="140" width="1360" height="620" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="180" y="240" font-size="54" font-weight="900" fill="#0f172a">目录</text>
    <text x="180" y="290" font-size="18" fill="#475569">本课件结构与节奏一目了然</text>
    <g fill="#0f172a" font-size="18">
