<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(15,23,42,0.14)"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="150" y="140" width="610" height="280" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <circle cx="220" cy="220" r="34" fill="rgba(29,78,216,0.12)"/>
    <rect x="270" y="186" width="210" height="46" rx="14" fill="#1d4ed8"/>
    <text x="375" y="216" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">能力边界</text>
    <text x="270" y="278" font-size="22" font-weight="900" fill="#0f172a">明确“做什么 / 不做什么”</text>
    <text x="270" y="316" font-size="18" fill="#334155">写清楚适用场景，避免能力漂移</text>
    <text x="270" y="348" font-size="18" fill="#334155">给出拒绝条件：不该接就不接</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="140" width="610" height="280" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <circle cx="910" cy="220" r="34" fill="rgba(4,120,87,0.12)"/>
    <rect x="960" y="186" width="210" height="46" rx="14" fill="#047857"/>
    <text x="1065" y="216" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">触发入口</text>
    <text x="960" y="278" font-size="22" font-weight="900" fill="#0f172a">让用户与系统“能触发”</text>
    <text x="960" y="316" font-size="18" fill="#334155">命令词 / 场景识别 / 参数约束</text>
    <text x="960" y="348" font-size="18" fill="#334155">触发后要进入明确的执行链路</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="470" width="610" height="280" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <circle cx="220" cy="550" r="34" fill="rgba(91,33,182,0.12)"/>
    <rect x="270" y="516" width="210" height="46" rx="14" fill="#5b21b6"/>
    <text x="375" y="546" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">输入输出</text>
    <text x="270" y="608" font-size="22" font-weight="900" fill="#0f172a">把“读什么、写什么”讲清楚</text>
    <text x="270" y="646" font-size="18" fill="#334155">输入：文件、目录、示例、规则</text>
    <text x="270" y="678" font-size="18" fill="#334155">输出：产物文件、路径、命名与格式</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="470" width="610" height="280" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <circle cx="910" cy="550" r="34" fill="rgba(194,65,12,0.12)"/>
    <rect x="960" y="516" width="210" height="46" rx="14" fill="#c2410c"/>
    <text x="1065" y="546" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">质量保障</text>
    <text x="960" y="608" font-size="22" font-weight="900" fill="#0f172a">让结果“可检查、可回改”</text>
    <text x="960" y="646" font-size="18" fill="#334155">质检：字段合法、页序一致、素材存在</text>
    <text x="960" y="678" font-size="18" fill="#334155">回改：未通过门禁就返回上一阶段修正</text>
  </g>
</svg>
