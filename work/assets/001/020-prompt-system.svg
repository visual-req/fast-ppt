<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">为什么要拆成总入口 + 四类子 prompt</text>
  <text x="90" y="155" font-size="20" fill="#475569">总入口负责公共规则，子 prompt 负责结构节奏与文风分流</text>

  <g filter="url(#shadow)">
    <rect x="560" y="200" width="480" height="140" rx="26" fill="#1d4ed8"/>
    <text x="800" y="265" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">总入口（00_PPT生成）</text>
    <text x="800" y="305" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.88)">目录 / 公共规范 / 类型判定 / 交付约束</text>
  </g>

  <g stroke="#1d4ed8" stroke-width="6" fill="none" opacity="0.55">
    <path d="M800 340 V410"/>
    <path d="M800 410 C620 430 500 470 300 520"/>
    <path d="M800 410 C730 450 680 490 610 520"/>
    <path d="M800 410 C870 450 920 490 990 520"/>
    <path d="M800 410 C980 430 1100 470 1300 520"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="520" width="280" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="300" y="580" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">课件类</text>
    <text x="300" y="620" text-anchor="middle" font-size="16" fill="#475569">教学链路 / 练习 / 小结</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="520" width="280" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="610" y="580" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">方案类</text>
    <text x="610" y="620" text-anchor="middle" font-size="16" fill="#475569">架构方案 / 路线图 / 风险</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="780" y="520" width="280" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="920" y="580" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">汇报类</text>
    <text x="920" y="620" text-anchor="middle" font-size="16" fill="#475569">结论优先 / 数据支撑</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1090" y="520" width="280" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1230" y="580" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">演示类</text>
    <text x="1230" y="620" text-anchor="middle" font-size="16" fill="#475569">场景体验 / 亮点转化</text>
  </g>
</svg>
