<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(15,23,42,0.14)"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="150" width="1360" height="600" rx="28" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="240" width="420" height="220" rx="26" fill="rgba(29,78,216,0.08)" stroke="rgba(29,78,216,0.22)"/>
    <rect x="210" y="270" width="170" height="46" rx="14" fill="#1d4ed8"/>
    <text x="295" y="300" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">阶段 1：大纲门禁</text>
    <text x="210" y="360" font-size="22" font-weight="900" fill="#0f172a">质检 outline.json</text>
    <text x="210" y="396" font-size="18" fill="#334155">类型正确、章节链路完整、图页比例达标</text>
    <text x="210" y="426" font-size="18" fill="#334155">通过才允许进入 detail</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="240" width="420" height="220" rx="26" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.12)"/>
    <rect x="670" y="270" width="170" height="46" rx="14" fill="#0f172a"/>
    <text x="755" y="300" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">阶段 2：详细生成</text>
    <text x="670" y="360" font-size="22" font-weight="900" fill="#0f172a">写 deck + slides</text>
    <text x="670" y="396" font-size="18" fill="#334155">按 layout 规则落盘</text>
    <text x="670" y="426" font-size="18" fill="#334155">概念页补齐 SVG 素材</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1100" y="240" width="420" height="220" rx="26" fill="rgba(91,33,182,0.08)" stroke="rgba(91,33,182,0.22)"/>
    <rect x="1130" y="270" width="170" height="46" rx="14" fill="#5b21b6"/>
    <text x="1215" y="300" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">阶段 3：详细门禁</text>
    <text x="1130" y="360" font-size="22" font-weight="900" fill="#0f172a">质检 slides/*.json</text>
    <text x="1130" y="396" font-size="18" fill="#334155">字段完整、页序一致、素材真实存在</text>
    <text x="1130" y="426" font-size="18" fill="#334155">通过才允许交付与预览</text>
  </g>

  <g stroke="#2563eb" stroke-width="8" fill="none" opacity="0.6">
    <line x1="600" y1="350" x2="640" y2="350" marker-end="url(#arrow)"/>
    <line x1="1060" y1="350" x2="1100" y2="350" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="520" width="880" height="170" rx="26" fill="rgba(194,65,12,0.08)" stroke="rgba(194,65,12,0.22)"/>
    <rect x="670" y="548" width="190" height="44" rx="14" fill="#c2410c"/>
    <text x="765" y="577" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">回改动作库</text>
    <text x="670" y="636" font-size="18" fill="#0f172a">补页 / 换布局 / 补图 / 重构内容 / 修正字段 / 统一命名</text>
    <text x="670" y="668" font-size="18" fill="#334155">任何门禁未通过，都回到对应阶段执行回改，然后重新跑门禁</text>
  </g>

  <g stroke="#c2410c" stroke-width="7" fill="none" opacity="0.85">
    <path d="M390 470 C420 560 520 600 640 604" marker-end="url(#arrowOrange)"/>
    <path d="M1310 470 C1280 560 1180 600 1060 604" marker-end="url(#arrowOrange)"/>
  </g>
</svg>
