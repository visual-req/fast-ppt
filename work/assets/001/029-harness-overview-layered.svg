<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="140" y="140" width="1320" height="620" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="210" width="360" height="160" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="240" y="232" width="150" height="44" rx="12" fill="#1d4ed8"/>
    <text x="315" y="262" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Context</text>
    <text x="240" y="308" font-size="18" fill="#0f172a">输入材料、规则、示例</text>
    <text x="240" y="342" font-size="16" fill="#475569">决定：模型能看到什么</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="210" width="360" height="160" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="640" y="232" width="150" height="44" rx="12" fill="#0f172a"/>
    <text x="715" y="262" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Planner</text>
    <text x="640" y="308" font-size="18" fill="#0f172a">拆阶段、排优先级</text>
    <text x="640" y="342" font-size="16" fill="#475569">决定：先做什么、后做什么</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="210" width="360" height="160" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <rect x="1040" y="232" width="150" height="44" rx="12" fill="#047857"/>
    <text x="1115" y="262" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Tools</text>
    <text x="1040" y="308" font-size="18" fill="#0f172a">读 / 写 / 搜 / 构建</text>
    <text x="1040" y="342" font-size="16" fill="#475569">负责：真实执行动作</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="420" width="560" height="160" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="240" y="442" width="190" height="44" rx="12" fill="#c2410c"/>
    <text x="335" y="472" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Environment</text>
    <text x="240" y="518" font-size="18" fill="#0f172a">目录、端口、依赖、构建环境</text>
    <text x="240" y="552" font-size="16" fill="#475569">保证：可运行、可复现</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="420" width="560" height="160" rx="22" fill="#ede9fe" stroke="#c4b5fd"/>
    <rect x="840" y="442" width="150" height="44" rx="12" fill="#5b21b6"/>
    <text x="915" y="472" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Memory</text>
    <text x="840" y="518" font-size="18" fill="#0f172a">阶段产物、决策、历史信息</text>
    <text x="840" y="552" font-size="16" fill="#475569">保证：跨轮延续、可回归</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="630" width="760" height="110" rx="22" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="440" y="653" width="170" height="44" rx="12" fill="#1d4ed8"/>
    <text x="525" y="683" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Evaluator</text>
    <text x="640" y="683" font-size="18" fill="#0f172a">结构 / 类型 / 内容 / 视觉质量门禁</text>
    <text x="640" y="712" font-size="16" fill="#475569">输出：通过 / 未通过 + 修改动作，驱动回改与回归验证</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="90" width="360" height="90" rx="22" fill="#0f172a"/>
    <text x="800" y="145" text-anchor="middle" font-size="22" font-weight="900" fill="#ffffff">Task Goal</text>
  </g>

  <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.55">
    <path d="M800 180 V210" marker-end="url(#arrow)"/>
    <path d="M400 370 V420" marker-end="url(#arrow)"/>
    <path d="M1120 370 V420" marker-end="url(#arrow)"/>
    <path d="M500 580 V630" marker-end="url(#arrow)"/>
    <path d="M1100 580 V630" marker-end="url(#arrow)"/>
    <path d="M800 370 V630" marker-end="url(#arrow)"/>
  </g>

  <g fill="#475569" font-size="16">
    <text x="140" y="810">结构层次：目标 →（看什么/先做什么/怎么做）→（可复现/可延续）→ 质量门禁（可回归）</text>
  </g>
</svg>
