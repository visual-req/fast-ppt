<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Context：决定模型到底能看到什么</text>
  <text x="90" y="155" font-size="20" fill="#475569">把“上下文”拆成 5 类可管理对象，避免越堆越乱</text>

  <g filter="url(#shadow)">
    <rect x="120" y="230" width="520" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="290" font-size="22" font-weight="900" fill="#0f172a">输入材料</text>
    <text x="160" y="326" font-size="18" fill="#475569">需求、现有产物、代码结构、业务数据</text>

    <text x="160" y="400" font-size="22" font-weight="900" fill="#0f172a">规则</text>
    <text x="160" y="436" font-size="18" fill="#475569">类型 prompt / 布局约束 / 输出目录规范</text>

    <text x="160" y="510" font-size="22" font-weight="900" fill="#0f172a">示例</text>
    <text x="160" y="546" font-size="18" fill="#475569">正例骨架（examples）+ 失败案例（反例）</text>

    <text x="160" y="620" font-size="22" font-weight="900" fill="#0f172a">裁剪</text>
    <text x="160" y="656" font-size="18" fill="#475569">只取相关材料，控制长度与噪声</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="230" width="780" height="560" rx="26" fill="#1d4ed8"/>
    <text x="740" y="290" font-size="22" font-weight="900" fill="#ffffff">风险清单（越常见越致命）</text>
    <g font-size="18" fill="rgba(255,255,255,0.9)">
      <text x="740" y="350">• 信息过载：材料过多但没有结构，模型“看不懂重点”</text>
      <text x="740" y="394">• 上下文污染：旧规则、旧产物混入导致输出跑偏</text>
      <text x="740" y="438">• 召回偏差：搜到了不相关的片段，错误被放大</text>
      <text x="740" y="482">• 边界缺失：没说清“不能做什么”，模型自由发挥</text>
      <text x="740" y="526">• 示例不一致：示例格式与目标结构不一致导致结果乱</text>
    </g>
    <text x="740" y="610" font-size="22" font-weight="900" fill="#ffffff">治理策略</text>
    <g font-size="18" fill="rgba(255,255,255,0.9)">
      <text x="740" y="660">1) 先定任务目标与输出结构</text>
      <text x="740" y="704">2) 规则优先于材料，示例对齐结构</text>
      <text x="740" y="748">3) 裁剪与禁区写清，避免“自由发挥”</text>
    </g>
  </g>
</svg>
