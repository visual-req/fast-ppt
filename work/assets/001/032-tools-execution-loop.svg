<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="160" y="200" width="1280" height="520" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.6">
    <path d="M420 460 H600" marker-end="url(#arrow)"/>
    <path d="M760 460 H940" marker-end="url(#arrow)"/>
    <path d="M1100 460 H1280" marker-end="url(#arrow)"/>
    <path d="M1280 460 C1380 460 1380 320 1280 320" marker-end="url(#arrow)"/>
    <path d="M1280 320 H940" marker-end="url(#arrow)"/>
    <path d="M940 320 H600" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="390" width="180" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="330" y="452" text-anchor="middle" font-size="22" font-weight="900" fill="#1d4ed8">读</text>
    <text x="330" y="488" text-anchor="middle" font-size="16" fill="#475569">Read</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="600" y="390" width="180" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="690" y="452" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">搜</text>
    <text x="690" y="488" text-anchor="middle" font-size="16" fill="#475569">Search / Grep</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="940" y="390" width="180" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1030" y="452" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">写</text>
    <text x="1030" y="488" text-anchor="middle" font-size="16" fill="#475569">Edit / Patch</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1280" y="390" width="180" height="140" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1370" y="452" text-anchor="middle" font-size="22" font-weight="900" fill="#047857">验</text>
    <text x="1370" y="488" text-anchor="middle" font-size="16" fill="#475569">Build / Preview</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="250" width="520" height="110" rx="22" fill="#dbeafe" stroke="#2563eb"/>
    <text x="1200" y="304" text-anchor="middle" font-size="22" font-weight="900" fill="#1d4ed8">诊断 → 修复 → 回归</text>
    <text x="1200" y="338" text-anchor="middle" font-size="16" fill="#475569">Diagnostics 把失败点变成可定位信号</text>
  </g>

  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Tools：让模型不只会说，还能真的去做</text>
  <text x="90" y="155" font-size="20" fill="#475569">工具链把“生成”变成“执行”：读 → 搜 → 写 → 构建/预览 → 诊断回改</text>
</svg>
