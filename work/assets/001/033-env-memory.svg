<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Environment 与 Memory：让结果可复现、让过程可延续</text>
  <text x="90" y="155" font-size="20" fill="#475569">环境负责“可运行”，记忆负责“可延续”；两者共同决定可回归</text>

  <g filter="url(#shadow)">
    <rect x="120" y="240" width="660" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="310" font-size="22" font-weight="900" fill="#0f172a">没有环境与记忆</text>
    <g fill="#334155" font-size="18">
      <text x="160" y="368">每轮都像从零开始，目录与端口状态不可控</text>
      <text x="160" y="412">依赖不一致导致“同样操作不同结果”</text>
      <text x="160" y="456">上轮结论无法继承，回改缺少依据</text>
    </g>
    <g stroke="#94a3b8" stroke-width="6" fill="none" opacity="0.85">
      <path d="M220 640 H680" marker-end="url(#arrow)"/>
    </g>
    <text x="220" y="612" font-size="16" fill="#64748b">输入</text>
    <text x="450" y="612" font-size="16" fill="#64748b">执行</text>
    <text x="650" y="612" font-size="16" fill="#64748b">结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="240" width="660" height="560" rx="26" fill="#dbeafe" stroke="#2563eb"/>
    <text x="860" y="310" font-size="22" font-weight="900" fill="#1d4ed8">具备环境与记忆</text>
    <g fill="#0f172a" font-size="18">
      <text x="860" y="368">Environment：路径、端口、依赖与构建状态可复现</text>
      <text x="860" y="412">Memory：阶段产物与决策可继承，跨轮连续推进</text>
      <text x="860" y="456">结果更接近真实工程协作：可追溯、可回归、可迭代</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="860" y="520" width="260" height="140" rx="22" fill="#ffffff" stroke="rgba(37,99,235,0.35)"/>
      <text x="990" y="576" text-anchor="middle" font-size="20" font-weight="900" fill="#0f172a">Environment</text>
      <text x="990" y="612" text-anchor="middle" font-size="16" fill="#475569">目录 / 端口 / 依赖</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1140" y="520" width="260" height="140" rx="22" fill="#ffffff" stroke="rgba(37,99,235,0.35)"/>
      <text x="1270" y="576" text-anchor="middle" font-size="20" font-weight="900" fill="#0f172a">Memory</text>
      <text x="1270" y="612" text-anchor="middle" font-size="16" fill="#475569">产物 / 决策 / 历史</text>
    </g>
    <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.7">
      <path d="M920 710 H1380" marker-end="url(#arrow)"/>
      <path d="M1380 710 C1460 710 1460 520 1380 520" marker-end="url(#arrow)"/>
      <path d="M1380 520 H920" marker-end="url(#arrow)"/>
    </g>
    <text x="920" y="682" font-size="16" fill="#334155">执行</text>
    <text x="1290" y="682" font-size="16" fill="#334155">检查</text>
    <text x="1240" y="540" font-size="16" fill="#334155">回归</text>
  </g>
</svg>
