<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <path d="M800 110 L1180 640 H420 Z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M540 560 H1060 L980 640 H620 Z" fill="#bfdbfe" stroke="rgba(37,99,235,0.35)" stroke-width="2"/>
    <rect x="580" y="574" width="210" height="44" rx="12" fill="#1d4ed8"/>
    <text x="685" y="604" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">发现错误</text>
    <text x="820" y="604" font-size="18" fill="#0f172a">把问题“找出来”：结构错、类型错、缺页、缺素材、断链</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M620 410 H980 L920 560 H680 Z" fill="#93c5fd" stroke="rgba(37,99,235,0.35)" stroke-width="2"/>
    <rect x="650" y="432" width="210" height="44" rx="12" fill="#1d4ed8"/>
    <text x="755" y="462" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">形成门禁</text>
    <text x="665" y="510" font-size="18" fill="#0f172a">把质量“写成规则”：通过项 / 未通过项 / 修改动作 / 阶段判定</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M700 240 H900 L860 410 H740 Z" fill="#60a5fa" stroke="rgba(37,99,235,0.35)" stroke-width="2"/>
    <rect x="720" y="266" width="210" height="44" rx="12" fill="#0f172a"/>
    <text x="825" y="296" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">稳定交付</text>
    <text x="725" y="352" font-size="18" fill="#0f172a">把系统“跑得稳”：可回归、可迭代、可协作，持续改进不会失控</text>
  </g>
</svg>
