<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="960" height="540" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="48" fill="url(#hdr)" rx="12"/>
  <rect x="0" y="24" width="960" height="24" fill="url(#hdr)"/>
  <text x="480" y="31" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="sans-serif">库存预测 AI 工作原理：从数据到决策闭环</text>

  <!-- ====== ROW 1: Data Sources ====== -->
  <text x="30" y="86" fill="#64748b" font-size="11" font-weight="700" font-family="sans-serif">数据采集</text>

  <rect x="30" y="96" width="170" height="50" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="116" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700" font-family="sans-serif">ERP 历史订单</text>
  <text x="115" y="135" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">销量/客单/季节</text>

  <rect x="220" y="96" width="170" height="50" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="116" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700" font-family="sans-serif">MES 生产数据</text>
  <text x="305" y="135" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">排产/产线/节拍</text>

  <rect x="410" y="96" width="170" height="50" rx="8" fill="#fff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="116" text-anchor="middle" fill="#0891b2" font-size="12" font-weight="700" font-family="sans-serif">WMS 库存数据</text>
  <text x="495" y="135" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">实时库存/库龄</text>

  <rect x="600" y="96" width="170" height="50" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="116" text-anchor="middle" fill="#d97706" font-size="12" font-weight="700" font-family="sans-serif">外部数据</text>
  <text x="685" y="135" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">天气/节假日/行业</text>

  <!-- Arrows down to data fusion -->
  <line x1="115" y1="146" x2="115" y2="186" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <line x1="305" y1="146" x2="305" y2="186" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <line x1="495" y1="146" x2="495" y2="186" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <line x1="685" y1="146" x2="685" y2="186" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>

  <!-- ====== ROW 2: Data Fusion & Feature Engineering ====== -->
  <text x="30" y="198" fill="#64748b" font-size="11" font-weight="700" font-family="sans-serif">数据融合与特征工程</text>

  <rect x="150" y="186" width="660" height="48" rx="10" fill="#1e3a8a" filter="url(#shadow)"/>
  <text x="480" y="208" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">数据清洗 → 缺失值填充 → 特征构建（时序窗口/滑动平均/交叉特征） → 归一化</text>
  <text x="480" y="226" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="10" font-family="sans-serif">输出：训练数据集 + 实时推理特征向量</text>

  <!-- Arrow down -->
  <line x1="480" y1="234" x2="480" y2="270" stroke="rgba(15,23,42,0.18)" stroke-width="2"/>

  <!-- ====== ROW 3: AI Model ====== -->
  <text x="30" y="282" fill="#64748b" font-size="11" font-weight="700" font-family="sans-serif">AI 模型推理</text>

  <rect x="30" y="270" width="290" height="72" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="296" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700" font-family="sans-serif">时序预测模型</text>
  <text x="175" y="316" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">Prophet / LSTM / LightGBM</text>
  <text x="175" y="334" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">输出：未来 7/14/30 天预测</text>

  <rect x="360" y="270" width="250" height="72" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="296" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700" font-family="sans-serif">异常检测模型</text>
  <text x="485" y="316" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">Isolation Forest / AutoEncoder</text>
  <text x="485" y="334" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">输出：异常波动告警</text>

  <rect x="650" y="270" width="280" height="72" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="296" text-anchor="middle" fill="#0891b2" font-size="13" font-weight="700" font-family="sans-serif">补货建议引擎</text>
  <text x="790" y="316" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">安全库存 → 建议补货量</text>
  <text x="790" y="334" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">输出：采购建议单</text>

  <!-- Arrow down -->
  <line x1="175" y1="342" x2="175" y2="375" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <line x1="485" y1="342" x2="485" y2="375" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <line x1="790" y1="342" x2="790" y2="375" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>

  <!-- ====== ROW 4: Decision & Action ====== -->
  <text x="30" y="390" fill="#64748b" font-size="11" font-weight="700" font-family="sans-serif">决策与执行</text>

  <rect x="150" y="375" width="660" height="48" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="480" y="397" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">自动生成补货计划 → 人工审批/自动执行 → 下发 WMS 出库 → 实时跟踪库存水位</text>
  <text x="480" y="415" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="10" font-family="sans-serif">闭环：执行结果反写训练集，持续优化模型精度</text>

  <!-- ====== Feedback loop arrow ====== -->
  <path d="M890 399 Q920 399 920 340 Q920 120 890 120" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.5"/>
  <polygon points="890,116 886,124 894,124" fill="#059669" opacity="0.5"/>
  <text x="932" y="260" fill="#059669" font-size="10" font-family="sans-serif" transform="rotate(90, 932, 260)" opacity="0.7">反馈闭环</text>

  <!-- Bottom: key metrics -->
  <rect x="40" y="450" width="880" height="70" rx="10" fill="#fff" stroke="rgba(15,23,42,0.06)" stroke-width="1" filter="url(#shadow)"/>

  <rect x="60" y="462" width="190" height="46" rx="6" fill="#eff6ff"/>
  <text x="155" y="482" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700" font-family="sans-serif">预测准确率</text>
  <text x="155" y="500" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="900" font-family="sans-serif">≥ 85%</text>

  <rect x="270" y="462" width="190" height="46" rx="6" fill="#f5f3ff"/>
  <text x="365" y="482" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="700" font-family="sans-serif">缺货率</text>
  <text x="365" y="500" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="900" font-family="sans-serif">↓ 60%</text>

  <rect x="480" y="462" width="190" height="46" rx="6" fill="#ecfdf5"/>
  <text x="575" y="482" text-anchor="middle" fill="#059669" font-size="11" font-weight="700" font-family="sans-serif">库存周转</text>
  <text x="575" y="500" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="900" font-family="sans-serif">↑ 40%</text>

  <rect x="690" y="462" width="210" height="46" rx="6" fill="#fffbeb"/>
  <text x="795" y="482" text-anchor="middle" fill="#d97706" font-size="11" font-weight="700" font-family="sans-serif">呆滞库存</text>
  <text x="795" y="500" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="900" font-family="sans-serif">↓ 45%</text>
</svg>
