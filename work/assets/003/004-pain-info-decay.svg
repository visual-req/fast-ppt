<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <rect width="900" height="480" rx="16" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">痛点一：需求模糊 —— 一页纸需求如何变成三套理解</text>

  <!-- Left: The one-page requirement -->
  <text x="160" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">一页纸 / 一句话需求</text>
  <rect x="30" y="84" width="260" height="120" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">"用户能在系统里管理订单"</text>
  <line x1="60" y1="124" x2="260" y2="124" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="160" y="142" font-size="10" fill="#dc2626">没有角色说明：谁管？</text>
  <text x="160" y="158" font-size="10" fill="#dc2626">没有操作范围：增删改查？</text>
  <text x="160" y="174" font-size="10" fill="#dc2626">没有权限边界：客服 vs 管理员？</text>
  <text x="160" y="190" font-size="10" fill="#dc2626">没有异常处理：重复/超时/缺货？</text>

  <!-- Arrow to three interpretations -->
  <line x1="290" y1="144" x2="340" y2="80" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="290" y1="144" x2="340" y2="144" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="290" y1="144" x2="340" y2="208" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Three interpretations -->
  <rect x="345" y="55" width="220" height="55" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/><text x="455" y="78" font-size="10" font-weight="700" fill="#0369a1">PM 的理解</text><text x="455" y="95" font-size="9" fill="#475569">就是后台列表页 + CRUD 表单</text>
  <rect x="345" y="120" width="220" height="55" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/><text x="455" y="143" font-size="10" font-weight="700" fill="#b45309">开发的实现</text><text x="455" y="160" font-size="9" fill="#475569">权限/校验/日志/并发全要加</text>
  <rect x="345" y="185" width="220" height="55" rx="10" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/><text x="455" y="208" font-size="10" font-weight="700" fill="#be185d">测试的用例</text><text x="455" y="225" font-size="9" fill="#475569">正常/边界/异常要全覆盖</text>
  <text x="455" y="258" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">三套理解 → 三套产物 → 上线即偏差</text>

  <!-- Bottom: Business expression issues -->
  <rect x="30" y="320" width="400" height="65" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="343" font-size="12" font-weight="700" fill="#b91c1c">业务表达的核心问题</text>
  <text x="50" y="365" font-size="10" fill="#64748b">1. 缺少详细场景展开：只写了"管理订单"，没说入库/出库/退换/对账</text>
  <text x="50" y="378" font-size="10" fill="#64748b">2. 考虑不周：没想清楚权限角色、数据范围、上下游影响</text>

  <rect x="460" y="320" width="400" height="65" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="660" y="343" font-size="12" font-weight="700" fill="#166534">visual-spec 如何解决</text>
  <text x="480" y="365" font-size="10" fill="#64748b">1. /vspec:new 把一句话展开为结构化规约：角色/功能/流程/场景</text>
  <text x="480" y="378" font-size="10" fill="#64748b">2. 自动生成 Open Questions 把模糊点显式化，消除假设</text>

  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#64748b">核心问题：模糊需求在传递中逐层衰减，每次解读都是一次失真</text>
</svg>
