<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="900" height="480" rx="16" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">痛点：信息分散 —— 没有单一事实来源</text>
  <text x="200" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">当前：需求散落在各处</text>
  <rect x="30" y="88" width="130" height="60" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">PRD 文档</text><text x="95" y="132" text-anchor="middle" font-size="9" fill="#ef4444">v3.2 已过时</text>
  <rect x="180" y="88" width="130" height="60" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">飞书群聊</text><text x="245" y="132" text-anchor="middle" font-size="9" fill="#f97316">99+ 未读</text>
  <rect x="60" y="168" width="110" height="55" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Jira Ticket</text><text x="115" y="208" text-anchor="middle" font-size="9" fill="#22c55e">PROJ-421</text>
  <rect x="190" y="168" width="110" height="55" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">会议纪要</text><text x="245" y="208" text-anchor="middle" font-size="9" fill="#8b5cf6">3 周前</text>
  <rect x="80" y="243" width="230" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="195" y="260" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">5 个信息源，0 个权威版本</text><text x="195" y="276" text-anchor="middle" font-size="9" fill="#64748b">谁也不知道最新版在哪</text>
  <line x1="340" y1="180" x2="390" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <text x="365" y="172" text-anchor="middle" font-size="9" fill="#64748b" font-weight="700">/vspec:new</text>
  <text x="600" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">解决：一份基线 = 所有角色的单一事实来源</text>
  <rect x="420" y="88" width="350" height="200" rx="14" fill="white" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="88" width="350" height="36" rx="14" fill="#16a34a"/><rect x="420" y="108" width="350" height="16" fill="#16a34a"/>
  <text x="595" y="111" text-anchor="middle" font-size="14" font-weight="800" fill="white">结构化需求基线（SSOT）</text>
  <rect x="440" y="132" width="310" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/><text x="595" y="151" text-anchor="middle" font-size="11" fill="#166534">角色定义 · 功能清单 · 场景矩阵 · 术语表</text>
  <rect x="440" y="168" width="310" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/><text x="595" y="187" text-anchor="middle" font-size="11" fill="#166534">所有角色（产品/开发/测试/设计）读取同一份</text>
  <rect x="440" y="204" width="310" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/><text x="595" y="223" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">变更 → 自动通知所有相关方</text>
  <rect x="440" y="240" width="310" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/><text x="595" y="259" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">追溯：谁改的、什么时候、影响什么</text>
  <rect x="30" y="320" width="390" height="60" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/><text x="60" y="345" font-size="11" fill="#b91c1c" font-weight="700">不用 visual-spec：</text><text x="60" y="365" font-size="10" fill="#64748b">每次讨论翻 5 个地方对需求，平均沟通 8 轮才对齐一次</text>
  <rect x="460" y="320" width="390" height="60" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/><text x="490" y="345" font-size="11" fill="#166534" font-weight="700">用 visual-spec：</text><text x="490" y="365" font-size="10" fill="#64748b">一份基线建立后，所有讨论回到同一个锚点，对齐从 8 轮降到 2 轮</text>
  <text x="450" y="420" font-size="11" fill="#64748b">关键：把「口头对齐」变成「显式规约」，把「散落信息」收敛为「单一事实来源」</text>
</svg>
