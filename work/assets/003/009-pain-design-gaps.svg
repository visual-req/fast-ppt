<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <defs><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter></defs>
  <rect width="900" height="480" rx="16" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">痛点：设计遗漏 —— PRD 只写功能，不写技术约束</text>
  <text x="180" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">PRD 里的功能描述</text>
  <rect x="30" y="78" width="300" height="90" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="180" y="102" font-size="12" fill="#b91c1c" font-weight="600">用户可以在后台管理商品</text>
  <text x="180" y="120" font-size="10" fill="#ef4444">可以增删改查</text>
  <text x="180" y="138" font-size="10" fill="#ef4444">列表要分页、支持搜索</text>
  <text x="180" y="156" font-size="10" fill="#ef4444">图片要上传</text>
  <text x="180" y="176" text-anchor="middle" font-size="9" fill="#94a3b8">就这么多...然后呢？</text>
  <line x1="330" y1="125" x2="380" y2="125" stroke="#dc2626" stroke-width="2"/>
  <text x="590" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">实际需要明确的设计维度</text>
  <rect x="390" y="78" width="400" height="200" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="405" y="90" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="450" y="110" text-anchor="middle" font-size="10" fill="#334155">RBAC 权限</text>
  <rect x="505" y="90" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="550" y="110" text-anchor="middle" font-size="10" fill="#334155">数据权限</text>
  <rect x="605" y="90" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="650" y="110" text-anchor="middle" font-size="10" fill="#334155">校验规则</text>
  <rect x="405" y="130" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="450" y="150" text-anchor="middle" font-size="10" fill="#334155">状态机</text>
  <rect x="505" y="130" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="550" y="150" text-anchor="middle" font-size="10" fill="#334155">关联删除</text>
  <rect x="605" y="130" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="650" y="150" text-anchor="middle" font-size="10" fill="#334155">超时重试</text>
  <rect x="405" y="170" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="450" y="190" text-anchor="middle" font-size="10" fill="#334155">操作日志</text>
  <rect x="505" y="170" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="550" y="190" text-anchor="middle" font-size="10" fill="#334155">消息通知</text>
  <rect x="605" y="170" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="650" y="190" text-anchor="middle" font-size="10" fill="#334155">并发锁</text>
  <rect x="455" y="212" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="500" y="232" text-anchor="middle" font-size="10" fill="#334155">批量导入</text>
  <rect x="555" y="212" width="90" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/><text x="600" y="232" text-anchor="middle" font-size="10" fill="#334155">导出</text>
  <text x="590" y="268" text-anchor="middle" font-size="9" fill="#16a34a">... 还有 20+ 个维度 PRD 完全没提</text>
  <rect x="30" y="310" width="830" height="70" rx="10" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="445" y="335" text-anchor="middle" font-size="13" font-weight="800" fill="#f59e0b">后果：开发凭经验补设计 → 质量因人而异 → 测试发现时已晚</text>
  <text x="445" y="358" text-anchor="middle" font-size="11" fill="#64748b">不同开发写出完全不同质量的代码，上线前才发现设计遗漏，返工成本最高</text>
  <rect x="30" y="395" width="830" height="55" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="445" y="418" text-anchor="middle" font-size="13" font-weight="800" fill="#2563eb">visual-spec 解法：/vspec:detail 自动展开 20+ 设计维度，逐项填完才进入编码</text>
  <text x="445" y="438" text-anchor="middle" font-size="11" fill="#3b82f6">「PRD 没写」不再是遗漏理由 —— 设计模板确保不会忘</text>
</svg>
