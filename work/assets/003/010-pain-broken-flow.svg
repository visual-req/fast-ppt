<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs><style>
    .bg{fill:#f8fafc}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:10}
    .node{fill:#dbeafe;stroke:#3b82f6;stroke-width:1.5;rx:8}
    .gap{fill:#fee2e2;stroke:#ef4444;stroke-width:2;rx:8;stroke-dasharray:6 3}
    .tl{font:700 22px sans-serif;fill:#0f172a}.sub{font:600 13px sans-serif;fill:#334155}
    .sm{font:500 12px sans-serif;fill:#1e293b}.xs{font:400 10px sans-serif;fill:#64748b}
    .arrow{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#ar)}
    .gap-arrow{stroke:#ef4444;stroke-width:2;fill:none;stroke-dasharray:5 3;marker-end:url(#gar)}
  </style><marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3"><path d="M0,0L6,3L0,6Z" fill="#94a3b8"/></marker>
  <marker id="gar" markerWidth="6" markerHeight="6" refX="5" refY="3"><path d="M0,0L6,3L0,6Z" fill="#ef4444"/></marker></defs>
  <rect class="bg" width="960" height="540"/>

  <text class="tl" x="480" y="32" text-anchor="middle">流程断裂：需求在传递中层层偏移</text>

  <!-- 五个节点 -->
  <rect class="node" x="30" y="70" width="155" height="80"/>
  <text class="sub" x="107" y="96" text-anchor="middle">产品</text>
  <text class="xs" x="107" y="114" text-anchor="middle">看到：业务场景</text>
  <text class="xs" x="107" y="130" text-anchor="middle">写出：PRD</text>
  <text class="xs" x="107" y="144" text-anchor="middle" fill="#ef4444">漏了权限/异常</text>

  <rect class="gap" x="195" y="102" width="130" height="16"/>
  <text class="xs" x="260" y="114" text-anchor="middle" fill="#ef4444">信息衰减</text>

  <rect class="node" x="335" y="70" width="155" height="80"/>
  <text class="sub" x="412" y="96" text-anchor="middle">设计师</text>
  <text class="xs" x="412" y="114" text-anchor="middle">看到：PRD</text>
  <text class="xs" x="412" y="130" text-anchor="middle">画出：交互稿</text>
  <text class="xs" x="412" y="144" text-anchor="middle" fill="#ef4444">未对齐业务约束</text>

  <rect class="gap" x="500" y="102" width="130" height="16"/>
  <text class="xs" x="565" y="114" text-anchor="middle" fill="#ef4444">理解偏移</text>

  <rect class="node" x="640" y="70" width="155" height="80"/>
  <text class="sub" x="717" y="96" text-anchor="middle">开发</text>
  <text class="xs" x="717" y="114" text-anchor="middle">看到：交互稿+PRD</text>
  <text class="xs" x="717" y="130" text-anchor="middle">写出：代码</text>
  <text class="xs" x="717" y="144" text-anchor="middle" fill="#ef4444">凭经验补设计</text>

  <rect class="gap" x="495" y="190" width="130" height="16"/>
  <text class="xs" x="560" y="202" text-anchor="middle" fill="#ef4444">又偏移</text>

  <rect class="node" x="640" y="216" width="155" height="80"/>
  <text class="sub" x="717" y="242" text-anchor="middle">测试</text>
  <text class="xs" x="717" y="260" text-anchor="middle">看到：PRD + 代码</text>
  <text class="xs" x="717" y="276" text-anchor="middle">写出：测试用例</text>
  <text class="xs" x="717" y="290" text-anchor="middle" fill="#ef4444">按自己理解验收</text>

  <rect class="gap" x="500" y="336" width="130" height="16"/>
  <text class="xs" x="565" y="348" text-anchor="middle" fill="#ef4444">再次偏移</text>

  <rect class="node" x="335" y="362" width="155" height="80"/>
  <text class="sub" x="412" y="388" text-anchor="middle">用户</text>
  <text class="xs" x="412" y="406" text-anchor="middle">收到：交付物</text>
  <text class="xs" x="412" y="422" text-anchor="middle">反馈：这不对</text>
  <text class="xs" x="412" y="436" text-anchor="middle" fill="#ef4444">和最初的预期不符</text>

  <!-- 右侧解法 -->
  <rect class="card" x="50" y="462" width="860" height="55" fill="#eff6ff" stroke="#3b82f6"/>
  <text class="sub" x="480" y="484" text-anchor="middle" fill="#1d4ed8">visual-spec 解法</text>
  <text class="xs" x="480" y="504" text-anchor="middle">一份结构化需求基线=所有角色单一事实来源。不基于前序环节输出，而基于原始规约基线。改变传递方式，打破信息衰减链条。</text>
</svg>
