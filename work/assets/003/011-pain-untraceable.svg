<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <rect width="900" height="480" rx="16" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">痛点：不可追溯 —— 需求变更后牵一发动不了全身</text>
  <text x="450" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">当前：需求变更后的断裂链条</text>
  <rect x="30" y="82" width="130" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/><text x="95" y="103" font-size="12" font-weight="700" fill="#b91c1c">需求变更</text><text x="95" y="120" font-size="9" fill="#ef4444">产品改了功能</text>
  <line x1="160" y1="107" x2="190" y2="107" stroke="#dc2626" stroke-width="2"/><text x="175" y="98" font-size="9" fill="#dc2626" font-weight="600">X</text>
  <rect x="195" y="82" width="130" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/><text x="260" y="103" font-size="12" font-weight="700" fill="#b91c1c">设计未同步</text><text x="260" y="120" font-size="9" fill="#ef4444">设计稿还是旧的</text>
  <line x1="325" y1="107" x2="355" y2="107" stroke="#dc2626" stroke-width="2"/><text x="340" y="98" font-size="9" fill="#dc2626" font-weight="600">X</text>
  <rect x="360" y="82" width="130" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/><text x="425" y="103" font-size="12" font-weight="700" fill="#b91c1c">测试未更新</text><text x="425" y="120" font-size="9" fill="#ef4444">用例还是旧的</text>
  <line x1="490" y1="107" x2="520" y2="107" stroke="#dc2626" stroke-width="2"/><text x="505" y="98" font-size="9" fill="#dc2626" font-weight="600">X</text>
  <rect x="525" y="82" width="130" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/><text x="590" y="103" font-size="12" font-weight="700" fill="#b91c1c">验收脱节</text><text x="590" y="120" font-size="9" fill="#ef4444">标准还是老的</text>
  <line x1="655" y1="107" x2="685" y2="107" stroke="#dc2626" stroke-width="2"/><text x="670" y="98" font-size="9" fill="#dc2626" font-weight="600">X</text>
  <rect x="690" y="82" width="150" height="50" rx="10" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5" stroke-dasharray="4 2"/><text x="765" y="103" font-size="12" font-weight="700" fill="#9f1239">上线 Bug</text><text x="765" y="120" font-size="9" fill="#e11d48">谁都没发现</text>
  <rect x="30" y="160" width="830" height="60" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="445" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">审计视角：需求→设计→实现→测试→上线的完整溯源链？</text>
  <text x="445" y="205" text-anchor="middle" font-size="10" fill="#64748b">三个月后问「这个功能当初为什么这样设计」——没人说得清。合规审计拿不出证据。</text>
  <text x="450" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">用 visual-spec：变更自动追溯</text>
  <rect x="30" y="265" width="830" height="80" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="50" y="280" width="115" height="45" rx="8" fill="white" stroke="#86efac" stroke-width="1"/><text x="107" y="299" font-size="11" font-weight="700" fill="#166534">需求基线</text><text x="107" y="314" font-size="9" fill="#64748b">/specs/baseline/</text>
  <line x1="165" y1="302" x2="190" y2="302" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="195" y="280" width="115" height="45" rx="8" fill="white" stroke="#86efac" stroke-width="1"/><text x="252" y="299" font-size="11" font-weight="700" fill="#166534">详细设计</text><text x="252" y="314" font-size="9" fill="#64748b">/specs/details/</text>
  <line x1="310" y1="302" x2="335" y2="302" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="340" y="280" width="115" height="45" rx="8" fill="white" stroke="#86efac" stroke-width="1"/><text x="397" y="299" font-size="11" font-weight="700" fill="#166534">原型模型</text><text x="397" y="314" font-size="9" fill="#64748b">/specs/models/</text>
  <line x1="455" y1="302" x2="480" y2="302" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="485" y="280" width="115" height="45" rx="8" fill="white" stroke="#86efac" stroke-width="1"/><text x="542" y="299" font-size="11" font-weight="700" fill="#166534">验收用例</text><text x="542" y="314" font-size="9" fill="#64748b">/specs/acceptance/</text>
  <line x1="600" y1="302" x2="625" y2="302" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="630" y="280" width="115" height="45" rx="8" fill="white" stroke="#86efac" stroke-width="1"/><text x="687" y="299" font-size="11" font-weight="700" fill="#166534">测试代码</text><text x="687" y="314" font-size="9" fill="#64748b">CI 流水线</text>
  <rect x="30" y="375" width="830" height="55" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="445" y="396" text-anchor="middle" font-size="13" font-weight="800" fill="#2563eb">所有产出物关联同一基线，变更后 /vspec:refine 自动标注影响范围</text>
  <text x="445" y="418" text-anchor="middle" font-size="11" fill="#3b82f6">每次变更记录：谁改的、为什么改、影响了哪些下游产出物 — 审计链完整可查</text>
</svg>
