<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <rect width="900" height="480" rx="16" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">痛点十二：外部依赖识别不足</text>
  <text x="450" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">当前：只关注系统内部，忽略上下游依赖</text>
  <rect x="30" y="85" width="260" height="80" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="160" y="110" font-size="11" font-weight="700" fill="#b91c1c">PRD 说：</text><text x="160" y="130" font-size="10" fill="#ef4444">「订单取消后退款」</text><text x="160" y="150" font-size="9" fill="#64748b">但没提到需要对接支付网关</text>
  <line x1="290" y1="125" x2="340" y2="125" stroke="#dc2626" stroke-width="2"/>
  <rect x="345" y="85" width="230" height="80" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="460" y="110" font-size="11" font-weight="700" fill="#166534">实际依赖：</text>
  <text x="460" y="130" font-size="10" fill="#64748b">支付网关 · 库存系统 · 物流系统</text>
  <text x="460" y="150" font-size="10" fill="#64748b">消息队列 · 风控系统</text>
  <text x="450" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">遗漏外部依赖 = 开发到一半才发现需要跨团队协调 = 严重延期</text>
  <rect x="30" y="230" width="830" height="55" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="445" y="254" font-size="12" font-weight="700" fill="#166534">visual-spec 解法：/vspec:detail 自动展开 inter-service-calls 维度</text>
  <text x="445" y="272" font-size="10" fill="#64748b">详细设计阶段就列出所有上下游接口依赖、调用方式、超时策略、降级方案</text>
</svg>
