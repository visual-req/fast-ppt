<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" fill="none">
  <defs>
    <linearGradient id="gMatch" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="sh18"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="900" height="540" rx="16" fill="#f8fafc"/>

  <text x="450" y="34" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">/vspec:accept — 为什么场景和验收用例天然匹配？</text>

  <!-- Left: Scenario Matrix (from /vspec:new) -->
  <text x="225" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">场景矩阵（/vspec:new 产出）</text>
  <rect x="30" y="78" width="390" height="160" rx="12" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh18)"/>

  <!-- Table header -->
  <rect x="30" y="78" width="390" height="32" rx="12" fill="#eff6ff"/>
  <rect x="30" y="98" width="390" height="12" fill="#eff6ff"/>
  <text x="90" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">角色</text>
  <text x="190" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">操作</text>
  <text x="290" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">条件</text>
  <text x="370" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">预期</text>

  <!-- Table rows -->
  <line x1="136" y1="110" x2="136" y2="230" stroke="#e2e8f0" stroke-width="1"/><line x1="236" y1="110" x2="236" y2="230" stroke="#e2e8f0" stroke-width="1"/><line x1="336" y1="110" x2="336" y2="230" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="90" y="132" text-anchor="middle" font-size="10" fill="#334155">管理员</text>
  <text x="190" y="132" text-anchor="middle" font-size="10" fill="#334155">创建订单</text>
  <text x="290" y="132" text-anchor="middle" font-size="10" fill="#10b981">库存充足</text>
  <text x="370" y="132" text-anchor="middle" font-size="10" fill="#334155">创建成功</text>

  <text x="90" y="154" text-anchor="middle" font-size="10" fill="#334155">管理员</text>
  <text x="190" y="154" text-anchor="middle" font-size="10" fill="#334155">创建订单</text>
  <text x="290" y="154" text-anchor="middle" font-size="10" fill="#f59e0b">库存为 0</text>
  <text x="370" y="154" text-anchor="middle" font-size="10" fill="#334155">提示缺货</text>

  <text x="90" y="176" text-anchor="middle" font-size="10" fill="#334155">客服</text>
  <text x="190" y="176" text-anchor="middle" font-size="10" fill="#334155">退款</text>
  <text x="290" y="176" text-anchor="middle" font-size="10" fill="#ef4444">已发货</text>
  <text x="370" y="176" text-anchor="middle" font-size="10" fill="#334155">先退货再退款</text>

  <text x="90" y="198" text-anchor="middle" font-size="10" fill="#334155">普通用户</text>
  <text x="190" y="198" text-anchor="middle" font-size="10" fill="#334155">查看订单</text>
  <text x="290" y="198" text-anchor="middle" font-size="10" fill="#334155">N/A</text>
  <text x="370" y="198" text-anchor="middle" font-size="10" fill="#334155">仅看到自己的</text>

  <text x="90" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">...</text>
  <text x="190" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">...</text>
  <text x="290" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">...</text>
  <text x="370" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">...</text>

  <!-- Center: Mapping arrow -->
  <text x="450" y="135" text-anchor="middle" font-size="13" font-weight="800" fill="#7c3aed">天然映射</text>
  <path d="M425 155l50 0" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6 3"/>
  <path d="M425 160l50 0" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6 3"/>
  <path d="M425 165l50 0" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6 3"/>

  <!-- Mapping explanation -->
  <rect x="436" y="110" width="28" height="10" rx="3" fill="#ede9fe"/><text x="450" y="118" text-anchor="middle" font-size="8" fill="#7c3aed">Given</text>
  <rect x="436" y="130" width="28" height="10" rx="3" fill="#ede9fe"/><text x="450" y="138" text-anchor="middle" font-size="8" fill="#7c3aed">When</text>
  <rect x="436" y="150" width="28" height="10" rx="3" fill="#ede9fe"/><text x="450" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">Then</text>

  <!-- Right: Acceptance Test -->
  <text x="675" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">验收用例（/vspec:accept 产出）</text>
  <rect x="480" y="78" width="390" height="160" rx="12" fill="white" stroke="#86efac" stroke-width="1.5" filter="url(#sh18)"/>

  <rect x="480" y="78" width="390" height="32" rx="12" fill="#ecfdf5"/>
  <rect x="480" y="98" width="390" height="12" fill="#ecfdf5"/>
  <text x="675" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">测试用例结构</text>

  <rect x="495" y="118" width="360" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="505" y="133" font-size="10" fill="#334155"><tspan font-weight="700" fill="#166534">Given </tspan>管理员登录 / 库存充足        → 前置条件 = 角色 + 条件</text>
  <text x="505" y="148" font-size="10" fill="#334155"><tspan font-weight="700" fill="#166534">When  </tspan>创建订单，填写商品信息    → 操作步骤 = 操作</text>

  <rect x="495" y="160" width="360" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="505" y="175" font-size="10" fill="#334155"><tspan font-weight="700" fill="#166534">Then  </tspan>订单创建成功，库存扣减    → 预期结果 = 预期</text>
  <text x="505" y="190" font-size="10" fill="#64748b"><tspan font-weight="700" fill="#059669">通过标准：</tspan>响应时间 &lt; 500ms，订单状态 = CONFIRMED</text>

  <rect x="495" y="202" width="360" height="28" rx="8" fill="#fefce8" stroke="#fcd34d" stroke-width="1"/>
  <text x="505" y="220" font-size="10" fill="#92400e">每个场景行 → H 正好一个测试用例，是一一对应的关系</text>

  <!-- Bottom: Why this works -->
  <text x="450" y="270" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">为什么场景和验收用例天然匹配？</text>

  <!-- Three reasons -->
  <rect x="30" y="290" width="260" height="90" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="160" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">同构性</text>
  <text x="160" y="338" text-anchor="middle" font-size="10" fill="#475569">场景矩阵的一行 = </text>
  <text x="160" y="354" text-anchor="middle" font-size="10" fill="#475569">角色 + 操作 + 条件 + 预期</text>
  <text x="160" y="370" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">测试用例 = Given+When+Then</text>

  <rect x="320" y="290" width="260" height="90" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="450" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">完整性</text>
  <text x="450" y="338" text-anchor="middle" font-size="10" fill="#475569">场景矩阵已覆盖三类路径：</text>
  <text x="450" y="354" text-anchor="middle" font-size="10" fill="#475569">正常（Happy Path）/ 边界 / 异常</text>
  <text x="450" y="370" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">测试用例自然覆盖三种类型</text>

  <rect x="610" y="290" width="260" height="90" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="740" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">一致性</text>
  <text x="740" y="338" text-anchor="middle" font-size="10" fill="#475569">场景是需求的显式表达</text>
  <text x="740" y="354" text-anchor="middle" font-size="10" fill="#475569">验收是对需求的验证</text>
  <text x="740" y="370" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600">两者必须有共同的基准</text>

  <!-- Bottom summary -->
  <rect x="30" y="400" width="840" height="55" rx="12" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="450" y="423" text-anchor="middle" font-size="13" font-weight="800" fill="#2563eb">场景矩阵和验收用例的共同锚点 = 需求基线</text>
  <text x="450" y="444" text-anchor="middle" font-size="11" fill="#475569">场景矩阵把需求的"所有可能情况"显式化 → 验收用例把"每种情况的结果"可执行化 → 一一对应，不遗漏不重复</text>

  <!-- Process chain -->
  <rect x="80" y="472" width="130" height="40" rx="8" fill="#dbeafe"/><text x="145" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">需求基线</text>
  <path d="M210 492h20" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr18)"/>
  <defs><marker id="arr18" markerWidth="7" markerHeight="5" refX="7" refY="2.5"><path d="M0 0l7 2.5-7 2.5z" fill="#64748b"/></marker></defs>
  <rect x="232" y="472" width="130" height="40" rx="8" fill="#ede9fe"/><text x="297" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed">场景矩阵</text>
  <path d="M362 492h20" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr18)"/>
  <rect x="384" y="472" width="130" height="40" rx="8" fill="#dcfce7"/><text x="449" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">验收用例</text>
  <path d="M514 492h20" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr18)"/>
  <rect x="536" y="472" width="130" height="40" rx="8" fill="#fef3c7"/><text x="601" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">自动化测试</text>
  <path d="M666 492h20" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr18)"/>
  <rect x="688" y="472" width="130" height="40" rx="8" fill="#f0fdf4"/><text x="753" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">CI 流水线</text>
</svg>
