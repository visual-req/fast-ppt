<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <defs>
    <linearGradient id="gCorr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="gPrec" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="gComp" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="540" rx="16" fill="#f8fafc"/>

  <text x="480" y="34" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">质量检查：/vspec:qc — 完整性 · 正确性 · 精确性</text>

  <!-- ========== 三大维度 ========== -->
  <!-- 正确性 -->
  <rect x="20" y="52" width="295" height="170" rx="14" fill="white" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="52" width="295" height="40" rx="14" fill="url(#gCorr)"/>
  <rect x="20" y="78" width="295" height="14" fill="url(#gCorr)"/>
  <text x="167" y="78" text-anchor="middle" font-size="15" font-weight="800" fill="white">正确性</text>

  <text x="167" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">逻辑一致性 &amp; 状态机完整性</text>
  <text x="42" y="136" font-size="10" fill="#334155">✓ 状态机迁移路径是否完整？</text>
  <text x="42" y="156" font-size="10" fill="#334155">✓ 前置后置条件是否矛盾？</text>
  <text x="42" y="176" font-size="10" fill="#334155">✓ 数据流与业务规则是否匹配？</text>
  <text x="42" y="196" font-size="10" fill="#334155">✓ 角色权限交叉是否正确？</text>
  <text x="42" y="216" font-size="10" fill="#1e40af" font-weight="600">核心：做的事对不对？</text>

  <!-- 精确性 -->
  <rect x="332" y="52" width="295" height="170" rx="14" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
  <rect x="332" y="52" width="295" height="40" rx="14" fill="url(#gPrec)"/>
  <rect x="332" y="78" width="295" height="14" fill="url(#gPrec)"/>
  <text x="479" y="78" text-anchor="middle" font-size="15" font-weight="800" fill="white">精确性</text>

  <text x="479" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">字段类型 &amp; 校验规则</text>
  <text x="354" y="136" font-size="10" fill="#334155">✓ 字段类型/长度/格式是否明确？</text>
  <text x="354" y="156" font-size="10" fill="#334155">✓ 必填/可选/默认值是否定义？</text>
  <text x="354" y="176" font-size="10" fill="#334155">✓ 校验规则输入/输出是否精确？</text>
  <text x="354" y="196" font-size="10" fill="#334155">✓ API 入参/出参是否完全定义？</text>
  <text x="354" y="216" font-size="10" fill="#7c3aed" font-weight="600">核心：描述得够不够细？</text>

  <!-- 完整性 -->
  <rect x="645" y="52" width="295" height="170" rx="14" fill="white" stroke="#059669" stroke-width="2" filter="url(#sh)"/>
  <rect x="645" y="52" width="295" height="40" rx="14" fill="url(#gComp)"/>
  <rect x="645" y="78" width="295" height="14" fill="url(#gComp)"/>
  <text x="792" y="78" text-anchor="middle" font-size="15" font-weight="800" fill="white">完整性</text>

  <text x="792" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">20+ 维度逐项覆盖检查</text>
  <text x="667" y="136" font-size="10" fill="#334155">✓ 所有角色是否有对应功能？</text>
  <text x="667" y="156" font-size="10" fill="#334155">✓ 所有场景(正常/边界/异常)是否覆盖？</text>
  <text x="667" y="176" font-size="10" fill="#334155">✓ 所有上游依赖是否声明？</text>
  <text x="667" y="196" font-size="10" fill="#334155">✓ 所有模块是否定义清楚？</text>
  <text x="667" y="216" font-size="10" fill="#059669" font-weight="600">核心：有没有遗漏？</text>

  <!-- ========== Middle: How it works ========== -->
  <text x="480" y="252" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">质量检查流程</text>

  <rect x="80" y="268" width="120" height="45" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="140" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">扫描 /specs/</text>
  
  <path d="M200 290h18" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr24)"/>
  <defs><marker id="arr24" markerWidth="7" markerHeight="5" refX="7" refY="2.5"><path d="M0 0l7 2.5-7 2.5z" fill="#64748b"/></marker></defs>

  <rect x="222" y="268" width="120" height="45" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="282" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">15+ 标准校验</text>

  <path d="M342 290h18" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr24)"/>

  <rect x="364" y="268" width="120" height="45" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="424" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">缺失项清单</text>

  <path d="M484 290h18" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr24)"/>

  <rect x="506" y="268" width="120" height="45" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="566" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">补充指导</text>

  <path d="M626 290h18" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr24)"/>

  <rect x="648" y="268" width="120" height="45" rx="10" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="708" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">qc_report</text>

  <path d="M768 290h18" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr24)"/>

  <rect x="790" y="268" width="150" height="45" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="865" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">设计阶段修复</text>

  <!-- Bottom: Output section -->
  <rect x="20" y="340" width="920" height="55" rx="12" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="480" y="364" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">输出：qc_report.json（结构化结果）+ qc_report.html（可读报告）</text>
  <text x="480" y="384" text-anchor="middle" font-size="10" fill="#475569">每条缺失项包含：维度（完整性/正确性/精确性）+ 严重程度 + 所在文件 + 补充建议</text>

  <!-- Bottom stats -->
  <rect x="20" y="412" width="220" height="55" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="130" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">15+</text>
  <text x="130" y="456" text-anchor="middle" font-size="10" fill="#64748b">内置行业标准</text>

  <rect x="260" y="412" width="220" height="55" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="370" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">20+</text>
  <text x="370" y="456" text-anchor="middle" font-size="10" fill="#64748b">设计维度全覆盖</text>

  <rect x="500" y="412" width="220" height="55" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="610" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">3 维</text>
  <text x="610" y="456" text-anchor="middle" font-size="10" fill="#64748b">质量评估模型</text>

  <rect x="740" y="412" width="200" height="55" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="840" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">设计阶段</text>
  <text x="840" y="456" text-anchor="middle" font-size="10" fill="#64748b">发现问题而非上线后</text>

  <text x="480" y="498" text-anchor="middle" font-size="10" fill="#94a3b8">质量不是「上线后才发现」，而是「在设计阶段就检查」—— 三维质检让遗漏无处可藏</text>
</svg>
