<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.18)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Prompt Engineering：把问题问准</text>
  <text x="90" y="155" font-size="20" fill="#475569">用结构化要素降低歧义：角色、目标、格式、约束、示例</text>

  <g filter="url(#shadow)">
    <rect x="620" y="320" width="360" height="150" rx="26" fill="#1d4ed8"/>
    <text x="800" y="388" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">任务目标</text>
    <text x="800" y="428" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.88)">你到底要模型“交付什么”</text>
  </g>

  <g stroke="#1d4ed8" stroke-width="6" fill="none" opacity="0.55">
    <path d="M620 372 C520 340 450 300 340 260"/>
    <path d="M800 320 C800 250 800 220 800 190"/>
    <path d="M980 372 C1080 340 1150 300 1260 260"/>
    <path d="M700 470 C610 520 520 580 430 650"/>
    <path d="M900 470 C990 520 1080 580 1170 650"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="190" y="210" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="350" y="262" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">角色</text>
    <text x="350" y="296" text-anchor="middle" font-size="16" fill="#475569">站在什么视角 / 负责什么</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="140" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="800" y="192" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">目标</text>
    <text x="800" y="226" text-anchor="middle" font-size="16" fill="#475569">最终结果长什么样</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1090" y="210" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1250" y="262" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">格式</text>
    <text x="1250" y="296" text-anchor="middle" font-size="16" fill="#475569">JSON / 表格 / 结构化输出</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="270" y="610" width="340" height="130" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="440" y="666" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">约束</text>
    <text x="440" y="702" text-anchor="middle" font-size="16" fill="#475569">边界 / 禁区 / 语气 / 长度</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="990" y="610" width="340" height="130" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1160" y="666" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">示例</text>
    <text x="1160" y="702" text-anchor="middle" font-size="16" fill="#475569">对齐样式 / 减少理解偏差</text>
  </g>
</svg>
