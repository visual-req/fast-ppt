<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Context Engineering：把材料组织对</text>
  <text x="90" y="155" font-size="20" fill="#475569">不是“给更多”，而是“给正确、给结构、给边界”</text>

  <g filter="url(#shadow)">
    <rect x="120" y="230" width="440" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="150" y="285" font-size="22" font-weight="800" fill="#0f172a">材料来源</text>
    <g font-size="18" fill="#334155">
      <text x="150" y="335">• 需求文件 / 目标说明</text>
      <text x="150" y="375">• 历史产物 / 旧版本</text>
      <text x="150" y="415">• 代码与目录结构</text>
      <text x="150" y="455">• 业务数据与口径</text>
    </g>
    <text x="150" y="525" font-size="22" font-weight="800" fill="#0f172a">示例骨架</text>
    <g font-size="18" fill="#334155">
      <text x="150" y="575">• outline 示例</text>
      <text x="150" y="615">• deck/slides 示例</text>
      <text x="150" y="655">• 失败案例反例</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="230" width="420" height="560" rx="26" fill="#1d4ed8"/>
    <text x="630" y="285" font-size="22" font-weight="800" fill="#ffffff">上下文打包</text>
    <g font-size="18" fill="rgba(255,255,255,0.9)">
      <text x="630" y="335">1) 选择与任务强相关的材料</text>
      <text x="630" y="375">2) 注入规则（类型/布局/目录）</text>
      <text x="630" y="415">3) 用示例对齐输出结构</text>
      <text x="630" y="455">4) 设定裁剪边界与禁区</text>
    </g>
    <text x="630" y="535" font-size="22" font-weight="800" fill="#ffffff">风险控制</text>
    <g font-size="18" fill="rgba(255,255,255,0.9)">
      <text x="630" y="585">• 信息过载：多而乱</text>
      <text x="630" y="625">• 上下文污染：旧规则混入</text>
      <text x="630" y="665">• 召回偏差：拿错材料</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="230" width="420" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1090" y="285" font-size="22" font-weight="800" fill="#0f172a">输出导向</text>
    <g font-size="18" fill="#334155">
      <text x="1090" y="335">• 明确“要写到哪里”</text>
      <text x="1090" y="375">• 明确“要产哪些文件”</text>
      <text x="1090" y="415">• 明确“哪一步要检查”</text>
    </g>
    <text x="1090" y="495" font-size="22" font-weight="800" fill="#0f172a">产物稳定性</text>
    <g font-size="18" fill="#334155">
      <text x="1090" y="545">• 结构更一致</text>
      <text x="1090" y="585">• 返工更可控</text>
      <text x="1090" y="625">• 更适合多轮迭代</text>
    </g>
  </g>

  <g stroke="#1d4ed8" stroke-width="6" fill="none" opacity="0.55">
    <path d="M560 510 H600"/>
    <path d="M1020 510 H1060"/>
  </g>
</svg>
