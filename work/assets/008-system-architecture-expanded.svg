<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="12" fill="url(#bg)"/>

  <rect x="0" y="0" width="960" height="48" fill="url(#hdr)" rx="12"/>
  <rect x="0" y="24" width="960" height="24" fill="url(#hdr)"/>
  <text x="480" y="31" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="sans-serif">流程系统建设：系统边界与协同</text>

  <rect x="340" y="64" width="280" height="72" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="92" text-anchor="middle" fill="#1e3a8a" font-size="16" font-weight="700" font-family="sans-serif">ERP 企业资源计划</text>
  <text x="480" y="114" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">财务 · 采购 · 销售 · 库存</text>

  <rect x="40" y="160" width="185" height="72" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="132.5" y="188" text-anchor="middle" fill="#6d28d9" font-size="16" font-weight="700" font-family="sans-serif">PLM 产品生命周期</text>
  <text x="132.5" y="210" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">BOM · 工艺 · 变更管理</text>

  <rect x="250" y="160" width="185" height="72" rx="8" fill="#fff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="342.5" y="188" text-anchor="middle" fill="#0891b2" font-size="16" font-weight="700" font-family="sans-serif">MES 制造执行</text>
  <text x="342.5" y="210" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">排产 · 报工 · 追溯</text>

  <rect x="460" y="160" width="185" height="72" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="552.5" y="188" text-anchor="middle" fill="#059669" font-size="16" font-weight="700" font-family="sans-serif">WMS 仓储管理</text>
  <text x="552.5" y="210" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">入库 · 出库 · 盘点</text>

  <rect x="670" y="160" width="185" height="72" rx="8" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="762.5" y="188" text-anchor="middle" fill="#ea580c" font-size="16" font-weight="700" font-family="sans-serif">SCM 供应链管理</text>
  <text x="762.5" y="210" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">计划协同 · 采购协同 · 供应商协同</text>

  <rect x="40" y="258" width="185" height="72" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="132.5" y="286" text-anchor="middle" fill="#d97706" font-size="16" font-weight="700" font-family="sans-serif">QMS 质量管理</text>
  <text x="132.5" y="308" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">检验 · SPC · 不合格品</text>

  <rect x="250" y="258" width="185" height="72" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="342.5" y="286" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="700" font-family="sans-serif">CMMS 设备维护</text>
  <text x="342.5" y="308" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">点检 · 保养 · 维修</text>

  <rect x="460" y="258" width="185" height="72" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="552.5" y="286" text-anchor="middle" fill="#4f46e5" font-size="15" font-weight="700" font-family="sans-serif">SCADA / EMS</text>
  <text x="552.5" y="308" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">实时监控 · 数采 · 能效</text>

  <rect x="670" y="258" width="185" height="72" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="762.5" y="286" text-anchor="middle" fill="#0284c7" font-size="16" font-weight="700" font-family="sans-serif">TMS 物流管理</text>
  <text x="762.5" y="308" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">运输计划 · 配送跟踪 · 签收回传</text>

  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <line x1="480" y1="136" x2="132.5" y2="160"/>
    <line x1="480" y1="136" x2="342.5" y2="160"/>
    <line x1="480" y1="136" x2="552.5" y2="160"/>
    <line x1="480" y1="136" x2="762.5" y2="160"/>
    <line x1="132.5" y1="232" x2="132.5" y2="258"/>
    <line x1="342.5" y1="232" x2="342.5" y2="258"/>
    <line x1="552.5" y1="232" x2="552.5" y2="258"/>
    <line x1="762.5" y1="232" x2="762.5" y2="258"/>
  </g>

  <rect x="90" y="382" width="780" height="112" rx="10" fill="#1e3a8a" opacity="0.06"/>
  <rect x="90" y="382" width="780" height="34" rx="10" fill="#1e3a8a" opacity="0.10"/>
  <text x="480" y="404" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="700" font-family="sans-serif">关键命题</text>

  <text x="190" y="444" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">边界划分</text>
  <line x1="235" y1="440" x2="290" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <text x="345" y="444" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">主数据归属</text>
  <line x1="395" y1="440" x2="450" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <text x="510" y="444" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">接口标准</text>
  <line x1="560" y1="440" x2="620" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <text x="690" y="444" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">时序一致性</text>
  <line x1="745" y1="440" x2="800" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="472" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">新增 SCM 与 TMS 后，可覆盖从供应协同、仓储执行到运输履约的完整链路</text>
</svg>
