<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  
  <rect width="960" height="540" rx="12" fill="url(#bg)"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="48" fill="url(#hdr)" rx="12"/>
  <rect x="0" y="24" width="960" height="24" fill="url(#hdr)"/>
  <text x="480" y="31" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="sans-serif">数据底座搭建</text>

  <!-- Three data type columns -->
  <rect x="40" y="70" width="270" height="200" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="70" width="270" height="40" rx="10" fill="#eff6ff"/>
  <rect x="40" y="90" width="270" height="20" fill="#eff6ff"/>
  <text x="175" y="96" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700" font-family="sans-serif">主数据</text>
  <text x="175" y="140" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">物料编码</text>
  <text x="175" y="165" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">BOM 结构</text>
  <text x="175" y="190" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">工艺路线</text>
  <text x="175" y="215" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">设备台账</text>
  <text x="175" y="240" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">→ 低频变更，强一致性</text>

  <rect x="345" y="70" width="270" height="200" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="345" y="70" width="270" height="40" rx="10" fill="#f5f3ff"/>
  <rect x="345" y="90" width="270" height="20" fill="#f5f3ff"/>
  <text x="480" y="96" text-anchor="middle" fill="#6d28d9" font-size="16" font-weight="700" font-family="sans-serif">事件数据</text>
  <text x="480" y="140" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">生产工单</text>
  <text x="480" y="165" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">质检记录</text>
  <text x="480" y="190" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">设备运行日志</text>
  <text x="480" y="215" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">出入库流水</text>
  <text x="480" y="240" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">→ 高频写入，实时性要求高</text>

  <rect x="650" y="70" width="270" height="200" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="70" width="270" height="40" rx="10" fill="#ecfeff"/>
  <rect x="650" y="90" width="270" height="20" fill="#ecfeff"/>
  <text x="785" y="96" text-anchor="middle" fill="#0891b2" font-size="16" font-weight="700" font-family="sans-serif">时序 &amp; 多媒体</text>
  <text x="785" y="140" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">传感器数据</text>
  <text x="785" y="165" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">设备影像</text>
  <text x="785" y="190" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">声纹数据</text>
  <text x="785" y="215" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">热成像</text>
  <text x="785" y="240" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">→ 海量写入，高压缩需求</text>

  <!-- Bottom section: Data governance -->
  <rect x="40" y="295" width="880" height="215" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="325" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700" font-family="sans-serif">数据治理关键要素</text>
  <line x1="300" y1="334" x2="660" y2="334" stroke="#3b82f6" stroke-width="2"/>

  <!-- Four pillars -->
  <rect x="60" y="350" width="195" height="140" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="157" y="378" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700" font-family="sans-serif">统一数据字典</text>
  <text x="157" y="405" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">业务术语标准化</text>
  <text x="157" y="425" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">字段级元数据</text>
  <text x="157" y="445" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">语义一致</text>

  <rect x="275" y="350" width="195" height="140" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="372" y="378" text-anchor="middle" fill="#6d28d9" font-size="14" font-weight="700" font-family="sans-serif">数据血缘追踪</text>
  <text x="372" y="405" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">全链路可追溯</text>
  <text x="372" y="425" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">端到端覆盖</text>
  <text x="372" y="445" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">影响分析</text>

  <rect x="490" y="350" width="195" height="140" rx="8" fill="#ecfeff" stroke="#67e8f9" stroke-width="1"/>
  <text x="587" y="378" text-anchor="middle" fill="#0891b2" font-size="14" font-weight="700" font-family="sans-serif">质量基线指标</text>
  <text x="587" y="405" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">完整性/准确性</text>
  <text x="587" y="425" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">及时性/一致性</text>
  <text x="587" y="445" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">自动化监控</text>

  <rect x="705" y="350" width="195" height="140" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="802" y="378" text-anchor="middle" fill="#d97706" font-size="14" font-weight="700" font-family="sans-serif">分层存储策略</text>
  <text x="802" y="405" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">🔥 热 → 内存/SSD</text>
  <text x="802" y="425" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">🌡 温 → HDD</text>
  <text x="802" y="445" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">❄ 冷 → 归档/对象存储</text>
</svg>
