<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">什么时候一个任务该升级到 Harness</text>
  <text x="90" y="155" font-size="20" fill="#475569">用“两维”快速判断：任务复杂度 × 质量稳定性要求</text>

  <g filter="url(#shadow)">
    <rect x="200" y="240" width="1200" height="560" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <line x1="800" y1="240" x2="800" y2="800" stroke="rgba(15,23,42,0.12)" stroke-width="2"/>
    <line x1="200" y1="520" x2="1400" y2="520" stroke="rgba(15,23,42,0.12)" stroke-width="2"/>
    <text x="800" y="840" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">任务复杂度（低 → 高）</text>
    <g transform="translate(140 520) rotate(-90)">
      <text x="0" y="0" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">质量稳定性要求（低 → 高）</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="270" width="540" height="220" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="260" y="320" font-size="22" font-weight="900" fill="#1d4ed8">低复杂度 / 低稳定性</text>
    <text x="260" y="360" font-size="18" fill="#334155">适合：Prompt / Context</text>
    <g font-size="17" fill="#334155">
      <text x="260" y="410">• 一次性文案</text>
      <text x="260" y="446">• 简单摘要</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="830" y="270" width="540" height="220" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="860" y="320" font-size="22" font-weight="900" fill="#c2410c">高复杂度 / 低稳定性</text>
    <text x="860" y="360" font-size="18" fill="#334155">危险区：返工成本高</text>
    <g font-size="17" fill="#334155">
      <text x="860" y="410">• 能做但经常跑偏</text>
      <text x="860" y="446">• 没有检查链路</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="550" width="540" height="220" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <text x="260" y="600" font-size="22" font-weight="900" fill="#047857">低复杂度 / 高稳定性</text>
    <text x="260" y="640" font-size="18" fill="#334155">需要：基础门禁</text>
    <g font-size="17" fill="#334155">
      <text x="260" y="690">• 加格式校验 / 目录校验</text>
      <text x="260" y="726">• 少量自动回归</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="830" y="550" width="540" height="220" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="860" y="600" font-size="22" font-weight="900" fill="#1d4ed8">高复杂度 / 高稳定性</text>
    <text x="860" y="640" font-size="18" fill="#334155">典型 Harness 区间</text>
    <g font-size="17" fill="#334155">
      <text x="860" y="690">• 多阶段（outline/detail/verify）</text>
      <text x="860" y="726">• 有工具、有环境、有评估、有回改</text>
    </g>
  </g>
</svg>
