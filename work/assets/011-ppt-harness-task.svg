<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.55">
    <path d="M360 280 H560" marker-end="url(#arrow)"/>
    <path d="M760 280 H960" marker-end="url(#arrow)"/>
    <path d="M1160 280 H1360" marker-end="url(#arrow)"/>
    <path d="M760 360 V520" marker-end="url(#arrow)"/>
    <path d="M1160 360 V520" marker-end="url(#arrow)"/>
    <path d="M1360 360 V520" marker-end="url(#arrow)"/>
    <path d="M1160 680 C1160 760 900 760 900 680" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="210" width="220" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="250" y="268" text-anchor="middle" font-size="22" font-weight="900" fill="#1d4ed8">需求输入</text>
    <text x="250" y="302" text-anchor="middle" font-size="16" fill="#475569">目标与材料</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="210" width="220" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="670" y="268" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">outline.json</text>
    <text x="670" y="302" text-anchor="middle" font-size="16" fill="#475569">先规划结构</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="210" width="220" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1070" y="268" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">deck + slides</text>
    <text x="1070" y="302" text-anchor="middle" font-size="16" fill="#475569">再细化页面</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1360" y="210" width="220" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1470" y="268" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">ppt-viewer</text>
    <text x="1470" y="302" text-anchor="middle" font-size="16" fill="#475569">聚合渲染</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="520" width="220" height="140" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="670" y="578" text-anchor="middle" font-size="22" font-weight="900" fill="#c2410c">work/assets</text>
    <text x="670" y="612" text-anchor="middle" font-size="16" fill="#475569">背景 / SVG / 图片</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="520" width="220" height="140" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1070" y="578" text-anchor="middle" font-size="22" font-weight="900" fill="#047857">质检（Evaluator）</text>
    <text x="1070" y="612" text-anchor="middle" font-size="16" fill="#475569">门禁与回改</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1360" y="520" width="220" height="140" rx="22" fill="#dbeafe" stroke="#2563eb"/>
    <text x="1470" y="578" text-anchor="middle" font-size="22" font-weight="900" fill="#1d4ed8">预览服务</text>
    <text x="1470" y="612" text-anchor="middle" font-size="16" fill="#475569">真实展示</text>
  </g>

  <g fill="#0f172a" opacity="0.78" font-size="18" font-weight="800">
    <text x="90" y="110">为什么它是典型 Harness 任务？</text>
  </g>
  <g fill="#334155" font-size="18">
    <text x="90" y="155">因为它同时包含：阶段化产物、素材落盘、工具执行、质量门禁、真实预览与回改闭环。</text>
