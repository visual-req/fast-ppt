<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">研发 AI 导入路径：从工具化到平台化</text>

  <!-- Phase 1 box -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="280" height="200" rx="16" fill="white" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
    <rect x="40" y="70" width="280" height="48" rx="16" fill="url(#phase1)"/>
    <rect x="40" y="102" width="280" height="16" fill="url(#phase1)"/>
    <text x="180" y="100" text-anchor="middle" font-size="17" font-weight="800" fill="white">阶段 1：工具接入</text>
    <circle cx="62" cy="94" r="11" fill="rgba(255,255,255,0.2)"/>
    <text x="62" y="99" text-anchor="middle" font-size="13" font-weight="900" fill="white">1</text>
  </g>
  <g font-size="13" fill="#334155">
    <text x="60" y="148">IDE 智能助手全量部署</text>
    <text x="60" y="174">知识库问答系统上线</text>
    <text x="60" y="200">自动化测试能力增强</text>
    <text x="60" y="226">编码规范与模板落地</text>
    <rect x="56" y="240" width="248" height="22" rx="11" fill="rgba(37,99,235,0.1)"/>
    <text x="180" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">目标：覆盖 80%+ 研发人员</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M328 120 L358 120" stroke="rgba(15,23,42,0.25)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="rgba(15,23,42,0.35)"/></marker></defs>

  <!-- Phase 2 box -->
  <g filter="url(#shadow)">
    <rect x="340" y="70" width="280" height="200" rx="16" fill="white" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
    <rect x="340" y="70" width="280" height="48" rx="16" fill="url(#phase2)"/>
    <rect x="340" y="102" width="280" height="16" fill="url(#phase2)"/>
    <text x="480" y="100" text-anchor="middle" font-size="17" font-weight="800" fill="white">阶段 2：工程融合</text>
    <circle cx="362" cy="94" r="11" fill="rgba(255,255,255,0.2)"/>
    <text x="362" y="99" text-anchor="middle" font-size="13" font-weight="900" fill="white">2</text>
  </g>
  <g font-size="13" fill="#334155">
    <text x="360" y="148">CI/CD 流水线集成 AI 卡点</text>
    <text x="360" y="174">质量门禁自动化（覆盖率/安全）</text>
    <text x="360" y="200">DevSecOps 安全扫描嵌入</text>
    <text x="360" y="226">规范与模板平台化沉淀</text>
    <rect x="356" y="240" width="248" height="22" rx="11" fill="rgba(79,70,229,0.1)"/>
    <text x="480" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">目标：交付周期缩短 20%</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M628 120 L658 120" stroke="rgba(15,23,42,0.25)" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Phase 3 box -->
  <g filter="url(#shadow)">
    <rect x="640" y="70" width="280" height="200" rx="16" fill="white" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
    <rect x="640" y="70" width="280" height="48" rx="16" fill="url(#phase3)"/>
    <rect x="640" y="102" width="280" height="16" fill="url(#phase3)"/>
    <text x="780" y="100" text-anchor="middle" font-size="17" font-weight="800" fill="white">阶段 3：资产沉淀</text>
    <circle cx="662" cy="94" r="11" fill="rgba(255,255,255,0.2)"/>
    <text x="662" y="99" text-anchor="middle" font-size="13" font-weight="900" fill="white">3</text>
  </g>
  <g font-size="13" fill="#334155">
    <text x="660" y="148">组件库与脚手架平台</text>
    <text x="660" y="174">可复用 Prompt/Agent 仓库</text>
    <text x="660" y="200">企业级工程效能度量体系</text>
    <text x="660" y="226">最佳实践库 &amp; 培训认证</text>
    <rect x="656" y="240" width="248" height="22" rx="11" fill="rgba(124,58,237,0.1)"/>
    <text x="780" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">目标：缺陷密度下降 30%</text>
  </g>

  <!-- Bottom metrics bar -->
  <rect x="40" y="295" width="880" height="220" rx="14" fill="white" stroke="rgba(15,23,42,0.06)" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="325" text-anchor="middle" font-size="16" font-weight="800" fill="#0f172a">关键度量指标</text>
  <line x1="60" y1="338" x2="900" y2="338" stroke="rgba(15,23,42,0.06)" stroke-width="1"/>

  <!-- KPI cards row -->
  <g font-size="12" fill="#64748b">
    <rect x="60" y="352" width="195" height="146" rx="12" fill="#f8fafc"/>
    <text x="158" y="386" text-anchor="middle" font-size="32" font-weight="900" fill="#2563eb">-20%</text>
    <text x="158" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">交付周期</text>
    <text x="158" y="430" text-anchor="middle" font-size="11" fill="#64748b">从需求到上线</text>
    <text x="158" y="450" text-anchor="middle" font-size="11" fill="#64748b">缩短 20%</text>

    <rect x="270" y="352" width="195" height="146" rx="12" fill="#f8fafc"/>
    <text x="368" y="386" text-anchor="middle" font-size="32" font-weight="900" fill="#4f46e5">-30%</text>
    <text x="368" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">缺陷密度</text>
    <text x="368" y="430" text-anchor="middle" font-size="11" fill="#64748b">千行代码缺陷数</text>
    <text x="368" y="450" text-anchor="middle" font-size="11" fill="#64748b">下降 30%</text>

    <rect x="480" y="352" width="195" height="146" rx="12" fill="#f8fafc"/>
    <text x="578" y="386" text-anchor="middle" font-size="32" font-weight="900" fill="#7c3aed">-40%</text>
    <text x="578" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">回归时长</text>
    <text x="578" y="430" text-anchor="middle" font-size="11" fill="#64748b">全量回归测试</text>
    <text x="578" y="450" text-anchor="middle" font-size="11" fill="#64748b">缩短 40%</text>

    <rect x="690" y="352" width="210" height="146" rx="12" fill="#f8fafc"/>
    <text x="795" y="386" text-anchor="middle" font-size="32" font-weight="900" fill="#0284c7">80%+</text>
    <text x="795" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">工具采纳率</text>
    <text x="795" y="430" text-anchor="middle" font-size="11" fill="#64748b">研发人员主动使用</text>
    <text x="795" y="450" text-anchor="middle" font-size="11" fill="#64748b">AI 辅助工具占比</text>
  </g>
</svg>
