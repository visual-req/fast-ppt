<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(15,23,42,0.14)"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="160" width="1360" height="560" rx="28" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
  </g>

  <g stroke="#2563eb" stroke-width="8" fill="none" opacity="0.55">
    <line x1="260" y1="450" x2="1340" y2="450" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="338" width="240" height="224" rx="22" fill="rgba(29,78,216,0.08)" stroke="rgba(29,78,216,0.22)"/>
    <rect x="190" y="360" width="120" height="40" rx="12" fill="#1d4ed8"/>
    <text x="250" y="386" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">步骤 1</text>
    <text x="190" y="438" font-size="22" font-weight="900" fill="#0f172a">识别意图</text>
    <text x="190" y="474" font-size="17" fill="#334155">判断是不是本 Skill 负责</text>
    <text x="190" y="506" font-size="17" fill="#334155">不匹配就明确拒绝与引导</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="338" width="240" height="224" rx="22" fill="rgba(4,120,87,0.08)" stroke="rgba(4,120,87,0.22)"/>
    <rect x="470" y="360" width="120" height="40" rx="12" fill="#047857"/>
    <text x="530" y="386" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">步骤 2</text>
    <text x="470" y="438" font-size="22" font-weight="900" fill="#0f172a">加载规则</text>
    <text x="470" y="474" font-size="17" fill="#334155">公共 prompt + 类型 prompt</text>
    <text x="470" y="506" font-size="17" fill="#334155">把“怎么做”变成可复用规范</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="338" width="240" height="224" rx="22" fill="rgba(91,33,182,0.08)" stroke="rgba(91,33,182,0.22)"/>
    <rect x="750" y="360" width="120" height="40" rx="12" fill="#5b21b6"/>
    <text x="810" y="386" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">步骤 3</text>
    <text x="750" y="438" font-size="22" font-weight="900" fill="#0f172a">组织输入</text>
    <text x="750" y="474" font-size="17" fill="#334155">需求 / 示例 / 目录约束</text>
    <text x="750" y="506" font-size="17" fill="#334155">把材料收敛成可执行上下文</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="338" width="240" height="224" rx="22" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.12)"/>
    <rect x="1030" y="360" width="120" height="40" rx="12" fill="#0f172a"/>
    <text x="1090" y="386" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">步骤 4</text>
    <text x="1030" y="438" font-size="22" font-weight="900" fill="#0f172a">产出阶段结果</text>
    <text x="1030" y="474" font-size="17" fill="#334155">先 outline，再 detail</text>
    <text x="1030" y="506" font-size="17" fill="#334155">让用户能确认、让系统可回归</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1290" y="338" width="240" height="224" rx="22" fill="rgba(194,65,12,0.08)" stroke="rgba(194,65,12,0.22)"/>
    <rect x="1310" y="360" width="120" height="40" rx="12" fill="#c2410c"/>
    <text x="1370" y="386" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">步骤 5</text>
    <text x="1310" y="438" font-size="22" font-weight="900" fill="#0f172a">阶段质检</text>
    <text x="1310" y="474" font-size="17" fill="#334155">门禁通过才进入下一阶段</text>
    <text x="1310" y="506" font-size="17" fill="#334155">未通过就回改并重跑</text>
  </g>

  <g stroke="#94a3b8" stroke-width="6" fill="none" opacity="0.85">
    <path d="M1410 330 C1438 260 1300 240 1090 280 C940 308 860 304 770 284" marker-end="url(#arrowGray)"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="900" y="214" width="420" height="70" rx="18" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <text x="1110" y="257" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">回改：失败回到“组织输入/加载规则”再修正</text>
  </g>
</svg>
