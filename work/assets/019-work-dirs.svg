<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">为什么要分 input / ppt / assets</text>
  <text x="90" y="155" font-size="20" fill="#475569">目录分工 = 输入可追溯、产物可复用、素材可落盘</text>

  <g filter="url(#shadow)">
    <rect x="120" y="240" width="440" height="520" rx="26" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="160" y="310" font-size="26" font-weight="900" fill="#1d4ed8">work/input</text>
    <text x="160" y="350" font-size="18" fill="#334155">放“原始材料”</text>
    <g font-size="18" fill="#334155">
      <text x="160" y="410">• 需求文档</text>
      <text x="160" y="450">• 参考资料</text>
      <text x="160" y="490">• 原始数据</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="580" y="240" width="440" height="520" rx="26" fill="#ecfdf5" stroke="#86efac"/>
    <text x="620" y="310" font-size="26" font-weight="900" fill="#047857">work/ppt</text>
    <text x="620" y="350" font-size="18" fill="#334155">放“可预览产物”</text>
    <g font-size="18" fill="#334155">
      <text x="620" y="410">• outline.json</text>
      <text x="620" y="450">• deck.json</text>
      <text x="620" y="490">• slides/*.json</text>
      <text x="620" y="530">• preview.html</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="1040" y="240" width="440" height="520" rx="26" fill="#fff7ed" stroke="#fdba74"/>
    <text x="1080" y="310" font-size="26" font-weight="900" fill="#c2410c">work/assets</text>
    <text x="1080" y="350" font-size="18" fill="#334155">放“可引用素材”</text>
    <g font-size="18" fill="#334155">
      <text x="1080" y="410">• 背景图</text>
      <text x="1080" y="450">• SVG 示意图</text>
      <text x="1080" y="490">• 截图 / 配图</text>
    </g>
  </g>

  <g stroke="#0f172a" stroke-width="5" opacity="0.35" fill="none">
    <path d="M560 500 H580"/>
    <path d="M1020 500 H1040"/>
  </g>
</svg>
