<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="710" height="720" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="130" y="150" font-size="26" font-weight="900" fill="#0f172a">工作原理：先 outline 再 detail</text>
    <text x="130" y="186" font-size="18" fill="#475569">先定章法与图页节奏，再把每页做实</text>

    <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.6">
      <path d="M180 260 H660" marker-end="url(#arrow)"/>
      <path d="M180 400 H660" marker-end="url(#arrow)"/>
      <path d="M180 540 H660" marker-end="url(#arrow)"/>
      <path d="M420 680 C560 680 560 600 420 600" marker-end="url(#arrow)"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="140" y="220" width="240" height="90" rx="20" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="260" y="276" text-anchor="middle" font-size="20" font-weight="900" fill="#1d4ed8">输入材料</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="420" y="220" width="240" height="90" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="540" y="268" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">outline.json</text>
      <text x="540" y="296" text-anchor="middle" font-size="14" fill="#475569">章节 / 页序 / 图页规划</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="140" y="360" width="240" height="90" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="260" y="408" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">大纲质检</text>
      <text x="260" y="436" text-anchor="middle" font-size="14" fill="#475569">链路 / 节奏 / 图页占比</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="420" y="360" width="240" height="90" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="540" y="408" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">detail 生成</text>
      <text x="540" y="436" text-anchor="middle" font-size="14" fill="#475569">deck + slides + assets</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="140" y="500" width="240" height="90" rx="20" fill="#ecfdf5" stroke="#86efac"/>
      <text x="260" y="548" text-anchor="middle" font-size="18" font-weight="900" fill="#047857">详细页质检</text>
      <text x="260" y="576" text-anchor="middle" font-size="14" fill="#475569">字段 / 素材 / 版式 / 过密</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="420" y="500" width="240" height="90" rx="20" fill="#dbeafe" stroke="#2563eb"/>
      <text x="540" y="548" text-anchor="middle" font-size="18" font-weight="900" fill="#1d4ed8">预览与回改</text>
      <text x="540" y="576" text-anchor="middle" font-size="14" fill="#475569">真实展示 → 问题定位 → 修正</text>
    </g>

    <g fill="#334155" font-size="16">
      <text x="130" y="740">收益：大纲先定“结构与节奏”，详细阶段只做“填充与优化”，返工从“整套重写”变成“局部回改”。</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="90" width="680" height="720" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="870" y="150" font-size="26" font-weight="900" fill="#0f172a">布局选择逻辑（给模型的明确规则）</text>
    <text x="870" y="186" font-size="18" fill="#475569">先判断页面意图，再选最合适的版式</text>

    <g stroke="#0f172a" stroke-width="4" opacity="0.25" fill="none">
      <path d="M1170 230 V290"/>
      <path d="M1170 360 V420"/>
      <path d="M1170 490 V550"/>
      <path d="M1170 620 V680"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="980" y="220" width="380" height="80" rx="18" fill="#0f172a"/>
      <text x="1170" y="270" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">页面意图是什么？</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="900" y="330" width="540" height="80" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="1170" y="380" text-anchor="middle" font-size="18" font-weight="900" fill="#1d4ed8">讲定义 / 结构 / 关系</text>
      <text x="1170" y="405" text-anchor="middle" font-size="14" fill="#475569">优先：svg_full（图解）/ architecture_layered / steps</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="900" y="460" width="540" height="80" rx="18" fill="#ecfdf5" stroke="#86efac"/>
      <text x="1170" y="510" text-anchor="middle" font-size="18" font-weight="900" fill="#047857">讲对比 / 选择 / 权衡</text>
      <text x="1170" y="535" text-anchor="middle" font-size="14" fill="#475569">优先：comparison_table / matrix_2x2 / impact_effort</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="900" y="590" width="540" height="80" rx="18" fill="#fff7ed" stroke="#fdba74"/>
      <text x="1170" y="640" text-anchor="middle" font-size="18" font-weight="900" fill="#c2410c">讲流程 / 执行链路</text>
      <text x="1170" y="665" text-anchor="middle" font-size="14" fill="#475569">优先：swimlane_process / steps / dependency_graph（必要时）</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="900" y="720" width="540" height="70" rx="18" fill="#dbeafe" stroke="#2563eb"/>
      <text x="1170" y="762" text-anchor="middle" font-size="16" font-weight="900" fill="#1d4ed8">规则：除非是“目录/知识树”，否则少用树形目录页</text>
    </g>
  </g>
</svg>
