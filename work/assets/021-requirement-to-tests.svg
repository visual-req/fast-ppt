<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg)"/>

  <text x="480" y="34" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700" font-family="sans-serif">从需求到测试资产生成</text>
  <text x="480" y="56" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">把需求说明、接口规则与业务流程结构化后，分别生成单元测试、集成测试和验收测试案例</text>

  <g filter="url(#shadow)">
    <rect x="60" y="88" width="240" height="116" rx="18" fill="url(#headerGrad)"/>
  </g>
  <text x="180" y="118" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" font-family="sans-serif">需求输入</text>
  <text x="180" y="144" text-anchor="middle" fill="#dbeafe" font-size="13" font-family="sans-serif">用户故事 / PRD / 接口契约 / 原型</text>
  <text x="84" y="172" fill="#ffffff" font-size="12" font-family="sans-serif">• 需求边界、角色、流程节点</text>
  <text x="84" y="192" fill="#ffffff" font-size="12" font-family="sans-serif">• 字段约束、异常场景、验收条件</text>

  <g filter="url(#shadow)">
    <rect x="360" y="88" width="240" height="116" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  </g>
  <text x="480" y="118" text-anchor="middle" fill="#1d4ed8" font-size="20" font-weight="700" font-family="sans-serif">AI 解析与拆解</text>
  <text x="480" y="144" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">把自然语言需求转换成可测试结构</text>
  <text x="384" y="172" fill="#334155" font-size="12" font-family="sans-serif">• 提取业务规则与数据断言</text>
  <text x="384" y="192" fill="#334155" font-size="12" font-family="sans-serif">• 区分模块级、接口级、流程级测试对象</text>

  <g filter="url(#shadow)">
    <rect x="660" y="88" width="240" height="116" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  </g>
  <text x="780" y="118" text-anchor="middle" fill="#1d4ed8" font-size="20" font-weight="700" font-family="sans-serif">测试生成引擎</text>
  <text x="780" y="144" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">按测试层级映射生成案例模板</text>
  <text x="684" y="172" fill="#334155" font-size="12" font-family="sans-serif">• Mock / 依赖替身 / 环境准备</text>
  <text x="684" y="192" fill="#334155" font-size="12" font-family="sans-serif">• 前置条件 / 步骤 / 期望结果</text>

  <line x1="300" y1="146" x2="360" y2="146" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="146" x2="660" y2="146" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="270" width="250" height="166" rx="18" fill="url(#testGrad)" stroke="#bfdbfe"/>
    <rect x="355" y="270" width="250" height="166" rx="18" fill="url(#testGrad)" stroke="#bfdbfe"/>
    <rect x="640" y="270" width="250" height="166" rx="18" fill="url(#testGrad)" stroke="#bfdbfe"/>
  </g>

  <rect x="94" y="288" width="202" height="34" rx="12" fill="#dbeafe"/>
  <text x="195" y="310" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700" font-family="sans-serif">单元测试案例</text>
  <text x="94" y="344" fill="#334155" font-size="12" font-family="sans-serif">对象：函数 / 类 / 模块</text>
  <text x="94" y="364" fill="#334155" font-size="12" font-family="sans-serif">输入：字段约束、分支规则、边界值</text>
  <text x="94" y="384" fill="#334155" font-size="12" font-family="sans-serif">生成：断言、Mock、异常用例</text>
  <text x="94" y="404" fill="#334155" font-size="12" font-family="sans-serif">输出：单测代码与覆盖点清单</text>

  <rect x="379" y="288" width="202" height="34" rx="12" fill="#dbeafe"/>
  <text x="480" y="310" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700" font-family="sans-serif">集成测试案例</text>
  <text x="379" y="344" fill="#334155" font-size="12" font-family="sans-serif">对象：服务接口 / 数据流 / 模块协同</text>
  <text x="379" y="364" fill="#334155" font-size="12" font-family="sans-serif">输入：接口契约、状态流转、依赖关系</text>
  <text x="379" y="384" fill="#334155" font-size="12" font-family="sans-serif">生成：调用链、环境准备、返回校验</text>
  <text x="379" y="404" fill="#334155" font-size="12" font-family="sans-serif">输出：集成测试脚本与联调清单</text>

  <rect x="664" y="288" width="202" height="34" rx="12" fill="#dbeafe"/>
  <text x="765" y="310" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700" font-family="sans-serif">验收测试案例</text>
  <text x="664" y="344" fill="#334155" font-size="12" font-family="sans-serif">对象：端到端业务流程与角色操作</text>
  <text x="664" y="364" fill="#334155" font-size="12" font-family="sans-serif">输入：验收条件、场景路径、业务结果</text>
  <text x="664" y="384" fill="#334155" font-size="12" font-family="sans-serif">生成：Given-When-Then 场景与验收步骤</text>
  <text x="664" y="404" fill="#334155" font-size="12" font-family="sans-serif">输出：UAT 案例、验收脚本与签收依据</text>

  <line x1="780" y1="204" x2="195" y2="270" stroke="#cbd5e1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="204" x2="480" y2="270" stroke="#cbd5e1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="204" x2="765" y2="270" stroke="#cbd5e1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="138" y="462" width="684" height="34" rx="14" fill="rgba(15,23,42,0.06)"/>
  <text x="480" y="484" text-anchor="middle" fill="#334155" font-size="12" font-family="sans-serif">关键思路：同一份需求先做结构化拆解，再按“模块、接口、流程”三个层级输出不同类型的测试案例</text>
</svg>
