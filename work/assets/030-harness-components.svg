<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Harness 六大组件总览</text>
  <text x="90" y="155" font-size="20" fill="#475569">围绕任务目标组织：Context / Planner / Tools / Memory / Environment / Evaluator</text>

  <g filter="url(#shadow)">
    <circle cx="800" cy="470" r="150" fill="#1d4ed8"/>
    <text x="800" y="460" text-anchor="middle" font-size="30" font-weight="900" fill="#ffffff">Task Goal</text>
    <text x="800" y="500" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.9)">稳定交付的目标</text>
  </g>

  <g stroke="#1d4ed8" stroke-width="6" opacity="0.5" fill="none">
    <path d="M800 320 V250"/>
    <path d="M650 420 L520 350"/>
    <path d="M950 420 L1080 350"/>
    <path d="M700 610 L580 700"/>
    <path d="M900 610 L1020 700"/>
    <path d="M800 620 V760"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="150" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="800" y="205" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Planner</text>
    <text x="800" y="238" text-anchor="middle" font-size="16" fill="#475569">拆阶段 / 决定下一步</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="290" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="520" y="345" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Context</text>
    <text x="520" y="378" text-anchor="middle" font-size="16" fill="#475569">材料 / 规则 / 示例</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="290" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1080" y="345" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Tools</text>
    <text x="1080" y="378" text-anchor="middle" font-size="16" fill="#475569">读写搜构建与执行</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="420" y="690" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="580" y="745" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Memory</text>
    <text x="580" y="778" text-anchor="middle" font-size="16" fill="#475569">跨轮延续与复用</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="860" y="690" width="320" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1020" y="745" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Environment</text>
    <text x="1020" y="778" text-anchor="middle" font-size="16" fill="#475569">目录 / 端口 / 依赖</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="780" width="320" height="90" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="800" y="835" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Evaluator</text>
  </g>
</svg>
