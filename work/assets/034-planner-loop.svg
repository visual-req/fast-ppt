<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="140" width="410" height="250" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <rect x="140" y="168" width="164" height="46" rx="14" fill="#1d4ed8"/>
    <text x="222" y="198" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">输入</text>
    <text x="140" y="248" font-size="22" font-weight="900" fill="#0f172a">任务目标与约束</text>
    <text x="140" y="286" font-size="18" fill="#334155">交付物是什么、边界在哪里、</text>
    <text x="140" y="316" font-size="18" fill="#334155">优先级与风险是什么</text>
    <rect x="140" y="344" width="340" height="30" rx="999" fill="rgba(37,99,235,0.10)"/>
    <text x="160" y="365" font-size="15" font-weight="800" fill="#1d4ed8">输出导向</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="140" width="410" height="250" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <rect x="1110" y="168" width="164" height="46" rx="14" fill="#c2410c"/>
    <text x="1192" y="198" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">回改</text>
    <text x="1110" y="248" font-size="22" font-weight="900" fill="#0f172a">什么时候该回改</text>
    <text x="1110" y="286" font-size="18" fill="#334155">门禁未通过 / 偏离目标 /</text>
    <text x="1110" y="316" font-size="18" fill="#334155">成本可控但收益很大</text>
    <rect x="1110" y="344" width="340" height="30" rx="999" fill="rgba(194,65,12,0.10)"/>
    <text x="1130" y="365" font-size="15" font-weight="800" fill="#c2410c">及时纠偏</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="540" width="410" height="250" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <rect x="140" y="568" width="164" height="46" rx="14" fill="#047857"/>
    <text x="222" y="598" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">执行</text>
    <text x="140" y="648" font-size="22" font-weight="900" fill="#0f172a">选动作并落地</text>
    <text x="140" y="686" font-size="18" fill="#334155">先读什么、先改什么、</text>
    <text x="140" y="716" font-size="18" fill="#334155">先跑什么、怎么复现</text>
    <rect x="140" y="744" width="340" height="30" rx="999" fill="rgba(4,120,87,0.10)"/>
    <text x="160" y="765" font-size="15" font-weight="800" fill="#047857">可执行</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="540" width="410" height="250" rx="26" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <rect x="1110" y="568" width="164" height="46" rx="14" fill="#5b21b6"/>
    <text x="1192" y="598" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">门禁</text>
    <text x="1110" y="648" font-size="22" font-weight="900" fill="#0f172a">检查并判定</text>
    <text x="1110" y="686" font-size="18" fill="#334155">结果是否可用、字段是否</text>
    <text x="1110" y="716" font-size="18" fill="#334155">合法、图是否真实存在</text>
    <rect x="1110" y="744" width="340" height="30" rx="999" fill="rgba(91,33,182,0.10)"/>
    <text x="1130" y="765" font-size="15" font-weight="800" fill="#5b21b6">可验证</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="800" cy="465" r="140" fill="#0f172a"/>
    <text x="800" y="452" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">Planner</text>
    <text x="800" y="492" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.86)">决定下一步，保证顺序与回改</text>
  </g>

  <g stroke="#1d4ed8" stroke-width="7" fill="none" opacity="0.55">
    <path d="M520 260 C640 190 690 170 800 170 C910 170 960 190 1080 260"/>
    <path d="M1340 390 C1430 460 1430 470 1340 540"/>
    <path d="M1080 760 C960 830 910 850 800 850 C690 850 640 830 520 760"/>
    <path d="M260 540 C170 470 170 460 260 390"/>
  </g>

  <g fill="#1d4ed8" opacity="0.85">
    <polygon points="1048,242 1108,260 1048,278"/>
    <polygon points="1348,528 1370,574 1322,552"/>
    <polygon points="552,778 492,760 552,742"/>
    <polygon points="252,402 230,356 278,378"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="76" width="380" height="66" rx="18" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
    <text x="800" y="118" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">输出 = 阶段计划 + 下一步动作 + 回改条件</text>
  </g>
</svg>
