<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Evaluator 的四层检查链路</text>
  <text x="90" y="155" font-size="20" fill="#475569">每一层都有“行首（检查域）”，并映射到同一条步骤链路</text>

  <g filter="url(#shadow)">
    <rect x="120" y="220" width="1360" height="580" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.6">
    <path d="M520 320 H1420" marker-end="url(#arrow)"/>
  </g>
  <g fill="#0f172a" font-size="16" opacity="0.72">
    <text x="520" y="292">步骤链路：输入 → 解析 → 校验 → 输出判定（通过 / 未通过 + 修改动作）</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="350" width="300" height="100" rx="20" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="200" y="410" font-size="22" font-weight="900" fill="#1d4ed8">结构检查</text>
    <text x="200" y="440" font-size="14" fill="#475569">目录 / 阶段 / 文件一致性</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="350" width="240" height="100" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="410" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">解析</text>
    <text x="640" y="440" text-anchor="middle" font-size="14" fill="#475569">outline / deck / slides</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="350" width="320" height="100" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="960" y="398" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">校验项</text>
    <text x="960" y="428" text-anchor="middle" font-size="14" fill="#475569">outline 是否存在，阶段顺序，slide_files 一致</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1160" y="350" width="280" height="100" rx="20" fill="#dbeafe" stroke="#2563eb"/>
    <text x="1300" y="410" text-anchor="middle" font-size="18" font-weight="900" fill="#1d4ed8">判定</text>
    <text x="1300" y="440" text-anchor="middle" font-size="14" fill="#475569">通过 / 未通过 + 修改动作</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="470" width="300" height="100" rx="20" fill="#ecfdf5" stroke="#86efac"/>
    <text x="200" y="530" font-size="22" font-weight="900" fill="#047857">类型检查</text>
    <text x="200" y="560" font-size="14" fill="#475569">类型一致 / 布局匹配</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="470" width="320" height="100" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="960" y="518" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">校验项</text>
    <text x="960" y="548" text-anchor="middle" font-size="14" fill="#475569">deck.type 与需求一致，布局符合类型节奏</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="590" width="300" height="100" rx="20" fill="#fff7ed" stroke="#fdba74"/>
    <text x="200" y="650" font-size="22" font-weight="900" fill="#c2410c">内容检查</text>
    <text x="200" y="680" font-size="14" fill="#475569">链路 / 关键问题 / 缺页</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="590" width="320" height="100" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="960" y="638" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">校验项</text>
    <text x="960" y="668" text-anchor="middle" font-size="14" fill="#475569">每章概念/练习/小结齐全，关键问题已回答</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="710" width="300" height="100" rx="20" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="200" y="770" font-size="22" font-weight="900" fill="#5b21b6">质量检查</text>
    <text x="200" y="800" font-size="14" fill="#475569">图页 / 素材 / 过密 / 交付</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="710" width="320" height="100" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="960" y="758" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">校验项</text>
    <text x="960" y="788" text-anchor="middle" font-size="14" fill="#475569">图页占比、素材落盘、文字密度、是否可交付</text>
  </g>
</svg>
