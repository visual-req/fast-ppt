<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">Harness 落地示例：生成 × 检查 × 预览如何串起来</text>
  <text x="90" y="155" font-size="20" fill="#475569">核心是把“文件产物”作为中枢，用构建与质检形成回改闭环</text>

  <g stroke="#2563eb" stroke-width="6" fill="none" opacity="0.55">
    <path d="M360 300 H540" marker-end="url(#arrow)"/>
    <path d="M740 300 H920" marker-end="url(#arrow)"/>
    <path d="M1120 300 H1300" marker-end="url(#arrow)"/>
    <path d="M920 380 V540" marker-end="url(#arrow)"/>
    <path d="M1300 380 V540" marker-end="url(#arrow)"/>
    <path d="M920 700 C920 780 740 780 740 700" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="230" width="220" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="250" y="286" text-anchor="middle" font-size="22" font-weight="900" fill="#0f172a">prompts</text>
    <text x="250" y="320" text-anchor="middle" font-size="16" fill="#475569">规则与示例</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="540" y="230" width="220" height="140" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="650" y="286" text-anchor="middle" font-size="20" font-weight="900" fill="#0f172a">outline.json</text>
    <text x="650" y="320" text-anchor="middle" font-size="16" fill="#475569">先规划结构</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="230" width="220" height="140" rx="22" fill="#dbeafe" stroke="#2563eb"/>
    <text x="1030" y="286" text-anchor="middle" font-size="20" font-weight="900" fill="#1d4ed8">slides/*.json</text>
    <text x="1030" y="320" text-anchor="middle" font-size="16" fill="#475569">详细页产物</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1300" y="230" width="220" height="140" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="1410" y="286" text-anchor="middle" font-size="20" font-weight="900" fill="#c2410c">assets</text>
    <text x="1410" y="320" text-anchor="middle" font-size="16" fill="#475569">背景 / SVG / 图片</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="540" width="380" height="160" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1030" y="602" text-anchor="middle" font-size="22" font-weight="900" fill="#047857">evaluator / build</text>
    <text x="1030" y="636" text-anchor="middle" font-size="16" fill="#475569">结构 / 类型 / 素材 / 版式门禁</text>
    <text x="1030" y="672" text-anchor="middle" font-size="16" fill="#475569">失败就定位并回改 slides/assets</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="540" width="280" height="160" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="1380" y="602" text-anchor="middle" font-size="22" font-weight="900" fill="#1d4ed8">ppt-viewer</text>
    <text x="1380" y="636" text-anchor="middle" font-size="16" fill="#475569">读取 deck/slides</text>
    <text x="1380" y="672" text-anchor="middle" font-size="16" fill="#475569">展示真实效果</text>
  </g>
</svg>
