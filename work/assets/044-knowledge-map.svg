<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,23,42,0.16)"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" font-size="44" font-weight="800" fill="#0f172a">从 Skill 到 Harness：知识地图</text>
  <text x="90" y="155" font-size="20" fill="#475569">把方法论收束成一张“可复述、可迁移”的工程地图</text>

  <g filter="url(#shadow)">
    <rect x="660" y="320" width="280" height="150" rx="26" fill="#0f172a"/>
    <text x="800" y="388" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">Agent 工程</text>
    <text x="800" y="426" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.86)">从生成到稳定交付</text>
  </g>

  <g stroke="#0f172a" stroke-width="6" opacity="0.22" fill="none">
    <path d="M660 380 C520 360 420 330 320 280"/>
    <path d="M940 380 C1080 360 1180 330 1280 280"/>
    <path d="M720 470 C620 540 520 610 420 690"/>
    <path d="M880 470 C980 540 1080 610 1180 690"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="210" width="380" height="170" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="170" y="265" font-size="22" font-weight="900" fill="#1d4ed8">三代工程</text>
    <text x="170" y="305" font-size="18" fill="#334155">Prompt → Context → Harness</text>
    <text x="170" y="343" font-size="16" fill="#475569">从“问法”到“材料”到“闭环系统”</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="210" width="380" height="170" rx="22" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1110" y="265" font-size="22" font-weight="900" fill="#047857">Harness 六大组件</text>
    <text x="1110" y="305" font-size="18" fill="#334155">Context / Planner / Tools</text>
    <text x="1110" y="341" font-size="18" fill="#334155">Memory / Environment / Evaluator</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="240" y="620" width="420" height="200" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="270" y="680" font-size="22" font-weight="900" fill="#c2410c">Skill 设计</text>
    <text x="270" y="720" font-size="18" fill="#334155">边界 / 入口 / 阶段 / 目录</text>
    <text x="270" y="758" font-size="18" fill="#334155">示例 / 规则 / 质检闭环</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="940" y="620" width="420" height="200" rx="22" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="970" y="680" font-size="22" font-weight="900" fill="#5b21b6">交付闭环</text>
    <text x="970" y="720" font-size="18" fill="#334155">生成 → 预览 → 检查 → 回改</text>
    <text x="970" y="758" font-size="18" fill="#334155">把“能生成”变成“能稳定交付”</text>
  </g>
</svg>
