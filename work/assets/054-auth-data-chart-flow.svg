<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(15,23,42,0.14)"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="110" width="1420" height="680" rx="28" fill="#ffffff" stroke="rgba(15,23,42,0.10)"/>
  </g>

  <g stroke="#2563eb" stroke-width="8" fill="none" opacity="0.55">
    <path d="M260 360 H1340" marker-end="url(#arrow)"/>
    <path d="M260 540 H1340" marker-end="url(#arrow)"/>
  </g>

  <g stroke="#94a3b8" stroke-width="6" fill="none" opacity="0.85">
    <path d="M1340 540 C1430 540 1430 380 1340 380" marker-end="url(#arrowGray)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="260" width="260" height="200" rx="22" fill="rgba(29,78,216,0.08)" stroke="rgba(29,78,216,0.22)"/>
    <rect x="190" y="282" width="110" height="38" rx="12" fill="#1d4ed8"/>
    <text x="245" y="308" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Auth</text>
    <text x="190" y="360" font-size="20" font-weight="900" fill="#0f172a">拿到可用凭证</text>
    <text x="190" y="392" font-size="15" fill="#334155">API Key / OAuth2</text>
    <text x="190" y="420" font-size="15" fill="#334155">不把密钥写入仓库</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="260" width="260" height="200" rx="22" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.12)"/>
    <rect x="490" y="282" width="110" height="38" rx="12" fill="#0f172a"/>
    <text x="545" y="308" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Fetch</text>
    <text x="490" y="360" font-size="20" font-weight="900" fill="#0f172a">抓取原始数据</text>
    <text x="490" y="392" font-size="15" fill="#334155">分页/限流/重试</text>
    <text x="490" y="420" font-size="15" fill="#334155">落盘原始响应</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="260" width="260" height="200" rx="22" fill="rgba(4,120,87,0.08)" stroke="rgba(4,120,87,0.22)"/>
    <rect x="790" y="282" width="110" height="38" rx="12" fill="#047857"/>
    <text x="845" y="308" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Store</text>
    <text x="790" y="360" font-size="20" font-weight="900" fill="#0f172a">沉淀可回归资产</text>
    <text x="790" y="392" font-size="15" fill="#334155">raw.json / meta</text>
    <text x="790" y="420" font-size="15" fill="#334155">可复现时间窗</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="260" width="260" height="200" rx="22" fill="rgba(194,65,12,0.08)" stroke="rgba(194,65,12,0.22)"/>
    <rect x="1090" y="282" width="110" height="38" rx="12" fill="#c2410c"/>
    <text x="1145" y="308" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Clean</text>
    <text x="1090" y="360" font-size="20" font-weight="900" fill="#0f172a">清洗与聚合</text>
    <text x="1090" y="392" font-size="15" fill="#334155">口径 / 缺失值</text>
    <text x="1090" y="420" font-size="15" fill="#334155">按维度聚合</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="520" width="260" height="200" rx="22" fill="rgba(91,33,182,0.08)" stroke="rgba(91,33,182,0.22)"/>
    <rect x="190" y="542" width="110" height="38" rx="12" fill="#5b21b6"/>
    <text x="245" y="568" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Analyze</text>
    <text x="190" y="620" font-size="20" font-weight="900" fill="#0f172a">形成指标与结论</text>
    <text x="190" y="652" font-size="15" fill="#334155">定义口径</text>
    <text x="190" y="680" font-size="15" fill="#334155">输出可解释结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="520" width="260" height="200" rx="22" fill="rgba(37,99,235,0.10)" stroke="rgba(37,99,235,0.22)"/>
    <rect x="490" y="542" width="110" height="38" rx="12" fill="#2563eb"/>
    <text x="545" y="568" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Chart</text>
    <text x="490" y="620" font-size="20" font-weight="900" fill="#0f172a">生成图表页</text>
    <text x="490" y="652" font-size="15" fill="#334155">ECharts / SVG</text>
    <text x="490" y="680" font-size="15" fill="#334155">含标题与口径</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="520" width="260" height="200" rx="22" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.12)"/>
    <rect x="790" y="542" width="110" height="38" rx="12" fill="#0f172a"/>
    <text x="845" y="568" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Write</text>
    <text x="790" y="620" font-size="20" font-weight="900" fill="#0f172a">写入 slides</text>
    <text x="790" y="652" font-size="15" fill="#334155">deck.json</text>
    <text x="790" y="680" font-size="15" fill="#334155">slides/*.json</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="520" width="260" height="200" rx="22" fill="rgba(4,120,87,0.08)" stroke="rgba(4,120,87,0.22)"/>
    <rect x="1090" y="542" width="110" height="38" rx="12" fill="#047857"/>
    <text x="1145" y="568" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff">Preview</text>
    <text x="1090" y="620" font-size="20" font-weight="900" fill="#0f172a">预览与回归</text>
    <text x="1090" y="652" font-size="15" fill="#334155">超屏/缺图</text>
    <text x="1090" y="680" font-size="15" fill="#334155">失败就回改</text>
  </g>
</svg>

